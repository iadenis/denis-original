<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denis · chimie organique</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#faf8f4;--bg2:#f0ebe2;--bg3:#e8dfd0;--ink:#1a1814;--ink2:#6b6760;--ink3:#b5b2ac;--sage:#7a9e87;--blush:#e8a598;--amber:#c8a870;--lav:#a89ec8;--line:rgba(26,24,20,0.08);}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
#s-home{align-items:center;justify-content:center;padding:2rem 1.5rem;gap:0;}
.home-logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.1em;color:var(--ink3);margin-bottom:4px;}
.home-title{font-family:'DM Mono',monospace;font-size:42px;font-weight:300;color:var(--ink);margin-bottom:4px;}
.home-sub{font-size:13px;color:var(--ink2);margin-bottom:2rem;font-weight:300;text-align:center;max-width:440px;line-height:1.6;}
.chap-list{max-width:520px;width:100%;display:flex;flex-direction:column;}
.chap-section{margin-bottom:1.5rem;}
.chap-section-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--line);}
.chap-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);cursor:pointer;transition:opacity 0.12s;}
.chap-row:last-child{border-bottom:none;}
.chap-row:hover{opacity:0.5;}
.chap-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);min-width:20px;}
.chap-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);flex:1;}
.chap-level{font-size:10px;color:var(--ink3);padding:1px 8px;border-radius:999px;border:1px solid var(--line);}
.chap-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);}
.topbar{display:flex;align-items:center;gap:10px;padding:0.7rem 1.5rem;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:0;z-index:50;}
.btnback{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);border:none;background:none;cursor:pointer;padding:0;}
.btnback:hover{color:var(--ink);}
.tmod{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink2);}
.spacer{flex:1;}
.pts{font-family:'DM Mono',monospace;font-size:11px;color:var(--sage);background:rgba(122,158,135,0.1);padding:3px 10px;border-radius:999px;border:1px solid rgba(122,158,135,0.2);}
.dots-row{display:flex;gap:3px;padding:0.4rem 1.5rem;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--bg3);border:1px solid var(--line);transition:all 0.3s;}
.dot.done{background:var(--sage);border-color:var(--sage);}
.dot.cur{background:var(--ink);border-color:var(--ink);transform:scale(1.3);}
.gbody{flex:1;display:grid;grid-template-columns:1fr 280px;}
@media(max-width:640px){.gbody{grid-template-columns:1fr;}.gright{border-left:none;border-top:1px solid var(--line);}}
.gleft{padding:1.5rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;border-right:1px solid var(--line);}
.gright{padding:1.1rem;display:flex;flex-direction:column;align-items:center;gap:0.9rem;background:var(--bg2);}
.ctag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;color:var(--ink3);text-transform:uppercase;}
.ccard{background:white;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.ccard-top{display:flex;align-items:center;gap:5px;padding:6px 11px;border-bottom:1px solid var(--line);background:var(--bg2);}
.cdot{width:7px;height:7px;border-radius:50%;}
.cbody{padding:0.9rem 1.1rem;font-family:'DM Mono',monospace;font-size:12px;line-height:1.95;color:var(--ink2);white-space:pre-wrap;}
.cbody .hl{color:var(--ink);font-weight:500;}
.cbody .cm{color:var(--ink3);font-style:italic;}
.cbody .kw{color:var(--sage);}
.cbody .r{color:#c85a5a;}
.cbody .b{color:#5a7ec8;}
.cbody .ex{display:block;background:var(--bg2);border:1px solid var(--line);border-radius:5px;padding:6px 10px;margin:4px 0;font-size:11.5px;line-height:1.7;color:var(--ink);}
.cbody .why{display:block;background:rgba(168,158,200,0.1);border:1px solid rgba(168,158,200,0.3);border-radius:5px;padding:6px 10px;margin:4px 0;font-size:11.5px;color:#4a4470;line-height:1.6;}
.qbadge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--ink3);display:inline-block;margin-bottom:6px;}
.qbadge.open{border-color:rgba(168,158,200,0.4);color:#4a4470;background:rgba(168,158,200,0.08);}
.qbadge.qcm{border-color:rgba(122,158,135,0.4);color:#3d6b4f;background:rgba(122,158,135,0.08);}
.qtext{font-size:14.5px;font-weight:400;color:var(--ink);line-height:1.6;}
.choices{display:flex;flex-direction:column;gap:5px;}
.choice{padding:9px 13px;border-radius:8px;border:1px solid var(--line);background:white;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;text-align:left;transition:all 0.11s;line-height:1.5;}
.choice:hover:not(:disabled){border-color:var(--ink3);background:var(--bg2);}
.choice.ok{background:rgba(122,158,135,0.1);border-color:var(--sage);color:#3d6b4f;}
.choice.no{background:rgba(232,165,152,0.1);border-color:var(--blush);color:#8b4a3e;}
.choice.dim{opacity:0.3;cursor:default;}
.open-wrap{display:flex;gap:7px;align-items:center;}
.open-input{flex:1;font-family:'DM Mono',monospace;font-size:13px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink);outline:none;}
.open-input:focus{border-color:var(--lav);}
.open-btn{font-family:'DM Mono',monospace;font-size:11px;padding:9px 14px;border-radius:8px;background:var(--ink);color:var(--bg);border:none;cursor:pointer;}
.open-btn:hover{opacity:0.75;}
.fb{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--ink2);line-height:1.7;padding:8px 12px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);display:none;}
.fb.show{display:block;}
.fb.ok{border-color:rgba(122,158,135,0.35);color:#3d6b4f;background:rgba(122,158,135,0.07);}
.fb.no{border-color:rgba(232,165,152,0.35);color:#8b4a3e;background:rgba(232,165,152,0.07);}
.fb.hint{border-color:rgba(200,168,112,0.35);color:#7a5e1e;background:rgba(200,168,112,0.07);}
.gactions{display:flex;gap:7px;align-items:center;}
.btnext{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.06em;padding:7px 16px;border-radius:999px;background:var(--ink);color:var(--bg);border:none;cursor:pointer;display:none;}
.btnext:hover{opacity:0.75;}
.btnext.show{display:block;}
.btnhint{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);border:1px solid var(--line);background:none;border-radius:999px;padding:7px 12px;cursor:pointer;}
.btnhint:hover{color:var(--ink2);}
.glbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;color:var(--ink3);text-transform:uppercase;align-self:flex-start;}
.grid-outer{background:white;border:1px solid var(--line);border-radius:11px;padding:6px;}
.grid{display:grid;grid-template-columns:repeat(6,36px);grid-template-rows:repeat(6,36px);gap:2px;}
.gcell{width:36px;height:36px;border-radius:5px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.2s;}
.gcell.trace{background:rgba(122,158,135,0.1);}
.gcell.trace::after{content:'·';color:var(--sage);font-size:15px;}
.gcell.goal{background:rgba(122,158,135,0.12);}
.gcell.robot{background:transparent;}
.mlog{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);align-self:flex-start;min-height:14px;}
.win{display:none;position:fixed;inset:0;background:rgba(250,248,244,0.97);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:1.1rem;padding:2rem;text-align:center;overflow-y:auto;}
.win.show{display:flex;}
.win-robot{font-size:36px;animation:bob 2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.win-title{font-family:'DM Mono',monospace;font-size:14px;color:var(--ink);}
.win-msgs{background:white;border:1px solid var(--line);border-radius:11px;padding:1rem 1.3rem;text-align:left;max-width:480px;width:100%;}
.win-msgs-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:9px;}
.win-msgs ul{list-style:none;display:flex;flex-direction:column;gap:6px;}
.win-msgs li{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--ink2);line-height:1.6;padding-left:13px;position:relative;}
.win-msgs li::before{content:'→';position:absolute;left:0;color:var(--sage);}
.win-btns{display:flex;gap:7px;}
.btn-restart{font-family:'DM Mono',monospace;font-size:11px;padding:8px 18px;border-radius:999px;background:var(--ink);color:var(--bg);border:none;cursor:pointer;}
.btn-restart:hover{opacity:0.75;}
.btn-menu{font-family:'DM Mono',monospace;font-size:11px;padding:8px 18px;border-radius:999px;background:none;color:var(--ink2);border:1px solid var(--line);cursor:pointer;}
.btn-menu:hover{border-color:var(--ink3);color:var(--ink);}
.pt{position:fixed;pointer-events:none;border-radius:50%;animation:fup 1s ease-out forwards;z-index:999;}
@keyframes fup{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-55px) scale(0);opacity:0}}
</style>
</head>
<body>
<div class="screen active" id="s-home">
  <div class="home-logo">denis · sciences exactes</div>
  <div class="home-title">chimie organique</div>
  <div class="home-sub">modules 11–14 · nomenclature · réactivité · stéréochimie · aromatiques<br>5 questions par notion · du débutant au niveau L2</div>
  <div class="chap-list" id="chap-list"></div>
</div>
<div class="screen" id="s-game">
  <div class="topbar">
    <button class="btnback" onclick="goHome()">← chimie organique</button>
    <span style="color:var(--ink3);font-size:12px;">/</span>
    <span class="tmod" id="g-title"></span>
    <div class="spacer"></div>
    <span class="pts" id="g-pts">0 pts</span>
  </div>
  <div class="dots-row" id="dots-row"></div>
  <div class="gbody">
    <div class="gleft">
      <div class="ctag" id="g-ctag"></div>
      <div class="ccard">
        <div class="ccard-top">
          <div class="cdot" style="background:#e8a598"></div>
          <div class="cdot" style="background:#e8d498"></div>
          <div class="cdot" style="background:#a8c8a0"></div>
        </div>
        <div class="cbody" id="g-concept"></div>
      </div>
      <div>
        <div class="qbadge" id="g-qbadge"></div>
        <div class="qtext" id="g-q"></div>
      </div>
      <div class="choices" id="g-choices"></div>
      <div class="open-wrap" id="g-open" style="display:none;">
        <input class="open-input" id="g-input" placeholder="tape ta réponse..." onkeydown="if(event.key==='Enter')checkOpen()">
        <button class="open-btn" onclick="checkOpen()">→</button>
      </div>
      <div class="fb" id="g-fb"></div>
      <div class="gactions">
        <button class="btnhint" onclick="doHint()">? indice</button>
        <button class="btnext" id="g-next" onclick="nextQ()">suivant →</button>
      </div>
    </div>
    <div class="gright">
      <div class="glbl">progression</div>
      <div class="grid-outer"><div class="grid" id="grid"></div></div>
      <div class="mlog" id="g-mlog">en attente...</div>
    </div>
  </div>
</div>
<div class="win" id="win">
  <div class="win-robot">🤖</div>
  <div class="win-title" id="win-title"></div>
  <div class="win-msgs">
    <div class="win-msgs-lbl">take_home_messages[]</div>
    <ul id="win-list"></ul>
  </div>
  <div class="win-btns">
    <button class="btn-restart" onclick="restartChap()">↺ recommencer</button>
    <button class="btn-menu" onclick="goHome()">chapitres</button>
  </div>
</div>

<script>
const CHAPTERS = [

// ══════════════════════════════════════════════════════
// MODULE 11 — NOMENCLATURE ET FONCTIONS
// ══════════════════════════════════════════════════════
{id:"o1a",sec:"module 11 · nomenclature et fonctions",num:"11",name:"hydrocarbures — alcanes, alcènes, alcynes",level:"débutant",
takeaway:["Alcanes CₙH₂ₙ₊₂ : liaisons simples, saturés, peu réactifs","Alcènes CₙH₂ₙ : une double liaison C=C","Alcynes CₙH₂ₙ₋₂ : une triple liaison C≡C","Préfixes : meth(1), eth(2), prop(3), but(4), pent(5), hex(6)","Isomères de constitution : même formule, enchaînement différent"],
questions:[
{c:"notion · alcanes — formule",type:"qcm",
code:`<span class="cm">// alcanes CₙH₂ₙ₊₂ — liaisons simples</span>
<span class="ex">n=1 méthane  CH₄
n=2 éthane   C₂H₆
n=3 propane  C₃H₈
n=4 butane   C₄H₁₀</span>
<span class="cm">// saturés = liaisons simples uniquement</span>
<span class="why">// peu réactifs sauf combustion et halogénation radicalaire
// utilisés comme combustibles (gaz naturel = méthane)</span>`,
q:"Formule de l'hexane (n=6) ?",
ch:["C₆H₁₂","C₆H₁₄","C₆H₁₆","C₆H₁₀"],ok:1,
hint:"CₙH₂ₙ₊₂ : 2×6+2=14",
fb_ok:"// correct — hexane : C₆H₁₄.",
fb_no:"// CₙH₂ₙ₊₂ : n=6 → 2(6)+2=14 → C₆H₁₄.",mv:{dx:1,dy:0}},

{c:"notion · alcènes et alcynes",type:"qcm",
code:`<span class="cm">// alcènes et alcynes</span>
<span class="kw">alcène</span>  CₙH₂ₙ   : 1 double liaison C=C  (éthylène C₂H₄)
<span class="kw">alcyne</span>  CₙH₂ₙ₋₂ : 1 triple liaison C≡C  (acétylène C₂H₂)
<span class="why">// double liaison = site réactif → additions
// acétylène utilisé pour le soudage (très énergétique)
// éthylène = matière première plastiques (polyéthylène)</span>`,
q:"Le propène (propylène) a une double liaison. Sa formule moléculaire ?",
ch:["C₃H₈","C₃H₆","C₃H₄","C₃H₁₀"],ok:1,
hint:"alcène CₙH₂ₙ : n=3 → 2×3=6",
fb_ok:"// correct — propène : C₃H₆ (alcène).",
fb_no:"// alcène CₙH₂ₙ : n=3 → C₃H₆.",mv:{dx:0,dy:-1}},

{c:"calcul · degrés d'insaturation",type:"qcm",
code:`<span class="cm">// degrés d'insaturation (DI)</span>
DI = (2C + 2 − H) / 2   (pour CₓHᵧ)
<span class="hl">DI=1</span> : 1 double liaison ou 1 cycle
<span class="hl">DI=2</span> : 1 triple liaison ou 2 doubles ou 1 double + 1 cycle
<span class="ex">benzène C₆H₆ : DI = (12+2−6)/2 = 4 (3 doubles + 1 cycle)</span>`,
q:"Benzène C₆H₆ : DI = ?",
ch:["2","3","4","6"],ok:2,
hint:"DI = (2×6 + 2 − 6) / 2",
fb_ok:"// correct — DI = (12+2−6)/2 = 4. 3 doubles liaisons + 1 cycle = 4.",
fb_no:"// DI = (2×6+2−6)/2 = 8/2 = 4.",mv:{dx:1,dy:0}},

{c:"application · isomérie de constitution",type:"qcm",
code:`<span class="cm">// isomères de constitution — même formule, structure différente</span>
C₄H₁₀ → butane (chaîne droite) ou isobutane (ramifié)
<span class="ex">butane   : CH₃−CH₂−CH₂−CH₃
isobutane: CH₃−CH(CH₃)−CH₃</span>
<span class="why">// propriétés physiques différentes (Tébullition, etc.)
// indice d'octane de l'isobutane > butane → meilleur carburant</span>`,
q:"Le butanol (C₄H₉OH) peut exister sous plusieurs formes. Ces formes sont des :",
ch:["Isotopes","Isomères de constitution","Énantiomères uniquement","Conformères"],ok:1,
hint:"même formule moléculaire, structure différente = isomères de constitution",
fb_ok:"// correct — isomères de constitution : même formule moléculaire, enchaînements d'atomes différents.",
fb_no:"// même formule C₄H₉OH mais groupes −OH en positions différentes = isomères de constitution.",mv:{dx:0,dy:-1}},

{c:"piège · nomenclature IUPAC",type:"qcm",
code:`<span class="cm">// nomenclature IUPAC — règles de base</span>
1. Trouver la chaîne principale la plus longue
2. Numéroter pour donner le plus petit locant aux substituants
3. Nommer : locant-substituant + nom chaîne principale
<span class="ex">CH₃−CH(CH₃)−CH₂−CH₃ :
  chaîne principale = 4C → butane
  méthyle en C2 → <span class="hl">2-méthylbutane</span></span>`,
q:"CH₃−CH₂−CH(CH₃)−CH₃ : quel est le nom IUPAC ?",
ch:["2-méthylpropane","2-méthylbutane","3-méthylbutane","méthylbutane"],ok:1,
hint:"chaîne principale = 4C (butane). Méthyle sur quel carbone en numérotant par le plus court côté ?",
fb_ok:"// correct — 4C = butane. Méthyle en C2 (numéroter du côté ramification) → 2-méthylbutane.",
fb_no:"// chaîne la plus longue = 4C (butane). Méthyle sur C2 → 2-méthylbutane.",mv:{dx:1,dy:0}},
]},

{id:"o1b",sec:"module 11 · nomenclature et fonctions",num:"12",name:"groupes fonctionnels",level:"débutant",
takeaway:["Alcool −OH : polaire, liaisons H, acide faible (pKa~16)","Aldéhyde −CHO et cétone C=O : carbonyle, électrophile","Acide carboxylique −COOH : pKa 4-5, le plus acide des fonctions organiques","Amine −NH₂ : basique (pKb~4), nucléophile","Ester −COO− et amide −CONH− : produits de condensation"],
questions:[
{c:"notion · alcool",type:"qcm",
code:`<span class="cm">// alcool — groupe hydroxyle −OH</span>
<span class="kw">primaire</span>  : −OH sur C lié à 1 C (ex: éthanol CH₃CH₂OH)
<span class="kw">secondaire</span>: −OH sur C lié à 2 C
<span class="kw">tertiaire</span> : −OH sur C lié à 3 C
<span class="why">// polarité O−H → liaisons H → miscible avec eau
// déshydratation → alcène · oxydation → aldéhyde ou cétone
// éthanol : alcool de fermentation, antiseptique (70%)</span>`,
q:"L'éthanol CH₃−CH₂−OH est un alcool :",
ch:["Tertiaire","Secondaire","Primaire","Phénol"],ok:2,
hint:"le C portant −OH est lié à combien d'autres C ?",
fb_ok:"// correct — le C portant −OH (CH₂) n'est lié qu'à 1 autre C → alcool primaire.",
fb_no:"// C portant −OH lié à 1 autre C → primaire.",mv:{dx:1,dy:0}},

{c:"notion · carbonyle — aldéhyde vs cétone",type:"qcm",
code:`<span class="cm">// carbonyle C=O</span>
<span class="kw">aldéhyde</span> : −<span class="hl">CHO</span> (C=O en bout de chaîne)
  ex: formaldéhyde HCHO · acétaldéhyde CH₃CHO
<span class="kw">cétone</span>   : −<span class="hl">CO</span>− (C=O en milieu de chaîne)
  ex: acétone (CH₃)₂CO
<span class="why">// C carbonylique = électrophile → attaqué par nucléophiles
// test de Fehling/Tollens : aldéhyde s'oxyde (réducteur), cétone non</span>`,
q:"Dans le glucose (CHO en bout de chaîne), le groupe carbonyle est :",
ch:["Une cétone","Un aldéhyde","Un acide carboxylique","Un alcool"],ok:1,
hint:"C=O en bout de chaîne = aldéhyde",
fb_ok:"// correct — glucose = aldohexose. CHO en C1 = aldéhyde → réducteur (test Fehling positif).",
fb_no:"// C=O en bout de chaîne = aldéhyde. Le glucose est un aldéhyde (aldohexose).",mv:{dx:0,dy:-1}},

{c:"notion · acide carboxylique",type:"qcm",
code:`<span class="cm">// acide carboxylique −COOH</span>
<span class="kw">pKa</span> ≈ 4-5   (acide faible mais le plus acide des fonctions organiques)
<span class="ex">acide acétique CH₃COOH   pKa=4.76
acide formique HCOOH     pKa=3.75
acide benzoïque C₆H₅COOH pKa=4.20</span>
<span class="why">// groupement −COOH omniprésent en biologie
// acides aminés (−NH₂ et −COOH), acides gras, prostaglandines
// aspirine = acide acétylsalicylique (COOH + ester)</span>`,
q:"L'aspirine contient un groupe −COOH (pKa=3.5). C'est :",
ch:["Un alcool","Une amine","Un acide carboxylique","Un aldéhyde"],ok:2,
hint:"−COOH = groupe carboxyle = acide carboxylique",
fb_ok:"// correct — COOH = acide carboxylique. D'où le nom 'acide' acétylsalicylique.",
fb_no:"// −COOH = groupe carboxyle = acide carboxylique.",mv:{dx:1,dy:0}},

{c:"application · SN2 — inversion",type:"qcm",
code:`<span class="cm">// SN2 — substitution nucléophile bimoléculaire</span>
mécanisme en <span class="hl">un seul step</span>
Nu⁻ + R−X → Nu−R + X⁻

favorisé : C° primaire · Nu fort · solvant aprotique
v = k[substrat][Nu]   (ordre 2)

{c:"application · SN1 — carbocation",type:"qcm",

{c:"application · addition sur alcènes",type:"qcm",
code:`<span class="cm">// addition électrophile sur alcènes</span>
<span class="hl">règle de Markovnikov</span> :

(ou : l'électrophile va sur le C le plus substitué)
<span class="ex">propène + HBr :
  CH₃−CH=CH₂ + HBr → CH₃−CH(Br)−CH₃
  Br va sur C2 (plus substitué), pas C1</span>
<span class="why">// le carbocation le plus stable (tertiaire > secondaire > primaire)
// se forme sur le C le plus substitué → détermine le produit majoritaire</span>`,

hint:"H va sur C1 (plus de H), Br sur C2 (plus substitué) → carbocation secondaire",
fb_ok:"// correct — H sur C1 → Br sur C2 → 2-bromobutane (carbocation secondaire plus stable).",
fb_no:"// Markovnikov : H sur C le plus riche en H (C1), Br sur C2 → 2-bromobutane.",mv:{dx:0,dy:-1}},

// ═════════════════════════════════════════
//  MOTEUR
// ═════════════════════════════════════════
const SECTIONS={};
CHAPTERS.forEach(ch=>{if(!SECTIONS[ch.sec])SECTIONS[ch.sec]=[];SECTIONS[ch.sec].push(ch);});
let curChap=null,curQ=0,score=0,answered=false,rX=0,rY=5;
const GOAL={x:5,y:0};let traces=new Set();

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goHome(){document.getElementById('win').classList.remove('show');show('s-home');}

function buildHome(){
  const list=document.getElementById('chap-list');list.innerHTML='';
  Object.entries(SECTIONS).forEach(([sec,chaps])=>{
    const sd=document.createElement('div');sd.className='chap-section';
    const lbl=document.createElement('div');lbl.className='chap-section-lbl';lbl.textContent=sec;sd.appendChild(lbl);
    chaps.forEach(ch=>{
      const row=document.createElement('div');row.className='chap-row';
      row.innerHTML=`<span class="chap-num">${ch.num}.</span><span class="chap-name">${ch.name}</span><span class="chap-level">${ch.level}</span><span class="chap-count">${ch.questions.length} qs</span>`;
      row.onclick=()=>startChap(ch);sd.appendChild(row);});
    list.appendChild(sd);});}

function startChap(ch){curChap=ch;curQ=0;score=0;answered=false;rX=0;rY=5;traces=new Set();document.getElementById('win').classList.remove('show');buildGrid();loadQ();show('s-game');}

function loadQ(){
  answered=false;const q=curChap.questions[curQ];
  document.getElementById('g-title').textContent=curChap.name;
  document.getElementById('g-pts').textContent=score+' pts';
  document.getElementById('g-ctag').textContent=q.c;
  document.getElementById('g-concept').innerHTML=q.code;
  document.getElementById('g-q').textContent=q.q;
  document.getElementById('g-fb').className='fb';
  document.getElementById('g-next').className='btnext';
  const badge=document.getElementById('g-qbadge');
  badge.textContent=q.type==='qcm'?'QCM':'question ouverte';
  badge.className='qbadge '+(q.type==='qcm'?'qcm':'open');
  const dr=document.getElementById('dots-row');dr.innerHTML='';
  curChap.questions.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i<curQ?' done':i===curQ?' cur':'');dr.appendChild(d);});
  const cc=document.getElementById('g-choices'),ow=document.getElementById('g-open'),inp=document.getElementById('g-input');
  cc.innerHTML='';
  if(q.type==='qcm'){ow.style.display='none';q.ch.forEach((t,i)=>{const b=document.createElement('button');b.className='choice';b.textContent=t;b.onclick=()=>answerQcm(i);cc.appendChild(b);});}
  else{ow.style.display='flex';inp.value='';inp.disabled=false;document.querySelector('.open-btn').disabled=false;setTimeout(()=>inp.focus(),100);}
}

function answerQcm(idx){
  if(answered)return;answered=true;const q=curChap.questions[curQ];const ok=idx===q.ok;
  document.querySelectorAll('.choice').forEach((b,i)=>{if(i===q.ok)b.classList.add('ok');else if(i===idx&&!ok)b.classList.add('no');else b.classList.add('dim');b.onclick=null;});
  showFb(ok,q);}

function checkOpen(){
  if(answered)return;const q=curChap.questions[curQ];const val=document.getElementById('g-input').value.trim().toLowerCase();if(!val)return;
  const ok=q.keys.some(k=>val.includes(k.toLowerCase())||k.toLowerCase()===val);answered=true;
  document.getElementById('g-input').disabled=true;document.querySelector('.open-btn').disabled=true;showFb(ok,q);}

function showFb(ok,q){
  const fb=document.getElementById('g-fb');fb.className='fb show '+(ok?'ok':'no');fb.textContent=ok?q.fb_ok:q.fb_no;
  if(ok){score+=10;document.getElementById('g-pts').textContent=score+' pts';sparks();}
  moveRobot(q.mv.dx,q.mv.dy);document.getElementById('g-next').className='btnext show';}

function doHint(){const fb=document.getElementById('g-fb');fb.className='fb show hint';fb.textContent='? '+curChap.questions[curQ].hint;}
function nextQ(){curQ++;if(curQ>=curChap.questions.length){showWin();return;}loadQ();}

function showWin(){
  document.getElementById('win-title').textContent=`// ${curChap.name} · maîtrisé`;
  const ul=document.getElementById('win-list');ul.innerHTML='';
  curChap.takeaway.forEach(t=>{const li=document.createElement('li');li.textContent=t;ul.appendChild(li);});
  document.getElementById('win').classList.add('show');}

function restartChap(){document.getElementById('win').classList.remove('show');startChap(curChap);}

function buildGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let y=0;y<6;y++)for(let x=0;x<6;x++){const d=document.createElement('div');d.id=`gc${x}${y}`;d.className='gcell';if(x===GOAL.x&&y===GOAL.y)d.textContent='🏁';g.appendChild(d);}renderGrid();}

function renderGrid(){
  for(let y=0;y<6;y++)for(let x=0;x<6;x++){
    const d=document.getElementById(`gc${x}${y}`);if(!d)continue;
    d.className='gcell';d.textContent='';d.innerHTML='';
    if(x===GOAL.x&&y===GOAL.y){d.classList.add('goal');d.textContent='🏁';continue;}
    if(traces.has(`${x},${y}`))d.classList.add('trace');
    if(x===rX&&y===rY){d.classList.add('robot');d.innerHTML=`<svg width="26" height="26" viewBox="0 0 32 32" fill="none"><rect x="8" y="12" width="16" height="14" rx="4" fill="#1a1814"/><rect x="11" y="15" width="4" height="4" rx="1.5" fill="#faf8f4"/><rect x="17" y="15" width="4" height="4" rx="1.5" fill="#faf8f4"/><rect x="13" y="21" width="6" height="2" rx="1" fill="#7a9e87"/><rect x="14" y="8" width="4" height="5" rx="2" fill="#1a1814"/><circle cx="16" cy="7" r="2" fill="#c8a870"/><rect x="5" y="16" width="3" height="6" rx="1.5" fill="#1a1814"/><rect x="24" y="16" width="3" height="6" rx="1.5" fill="#1a1814"/><rect x="10" y="26" width="4" height="3" rx="1.5" fill="#1a1814"/><rect x="18" y="26" width="4" height="3" rx="1.5" fill="#1a1814"/></svg>`;}}}

function moveRobot(dx,dy){
  traces.add(`${rX},${rY}`);rX=Math.max(0,Math.min(5,rX+dx));rY=Math.max(0,Math.min(5,rY+dy));renderGrid();
  const dir=dx>0?'droite':dx<0?'gauche':dy<0?'haut':'bas';
  document.getElementById('g-mlog').textContent=`${curQ+1}/${curChap.questions.length} → ${dir}`;}

function sparks(){
  const cell=document.getElementById(`gc${rX}${rY}`);if(!cell)return;
  const r=cell.getBoundingClientRect();
  ['#c8a870','#e8a598','#7a9e87','#a89ec8'].forEach((c,i)=>{
    const p=document.createElement('div');p.className='pt';const s=3+Math.random()*5;
    p.style.cssText=`width:${s}px;height:${s}px;background:${c};left:${r.left+r.width/2+(-15+Math.random()*30)}px;top:${r.top+r.height/2}px;animation-delay:${i*0.05}s`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),1000);});}

buildHome();
</script>
