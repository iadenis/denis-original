<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denis · biochimie</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#faf8f4;--bg2:#f0ebe2;--bg3:#e8dfd0;--ink:#1a1814;--ink2:#6b6760;--ink3:#b5b2ac;--sage:#7a9e87;--blush:#e8a598;--amber:#c8a870;--lav:#a89ec8;--line:rgba(26,24,20,0.08);}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
#s-home{align-items:center;justify-content:center;padding:2rem 1.5rem;gap:0;}
.home-logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.1em;color:var(--ink3);margin-bottom:4px;}
.home-title{font-family:'DM Mono',monospace;font-size:42px;font-weight:300;color:var(--ink);margin-bottom:4px;}
.home-sub{font-size:13px;color:var(--ink2);margin-bottom:2rem;font-weight:300;text-align:center;max-width:460px;line-height:1.6;}
.chap-list{max-width:520px;width:100%;display:flex;flex-direction:column;}
.chap-section{margin-bottom:1.5rem;}
.chap-section-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--line);}
.chap-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);cursor:pointer;transition:opacity 0.12s;}
.chap-row:last-child{border-bottom:none;}
.chap-row:hover{opacity:0.5;}
.chap-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);min-width:24px;}
.chap-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);flex:1;}
.chap-level{font-size:10px;color:var(--ink3);padding:1px 8px;border-radius:999px;border:1px solid var(--line);}
.chap-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--lav);}
.topbar{display:flex;align-items:center;gap:10px;padding:0.7rem 1.5rem;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:0;z-index:50;}
.btnback{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);border:none;background:none;cursor:pointer;padding:0;}
.btnback:hover{color:var(--ink);}
.tmod{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink2);}
.spacer{flex:1;}
.pts{font-family:'DM Mono',monospace;font-size:11px;color:var(--sage);background:rgba(122,158,135,0.1);padding:3px 10px;border-radius:999px;border:1px solid rgba(122,158,135,0.2);}
.dots-row{display:flex;gap:2px;padding:0.4rem 1.5rem;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.dot{width:4px;height:4px;border-radius:50%;background:var(--bg3);border:1px solid var(--line);transition:all 0.3s;}
.dot.done{background:var(--sage);border-color:var(--sage);}
.dot.cur{background:var(--ink);border-color:var(--ink);transform:scale(1.3);}
.gbody{flex:1;display:grid;grid-template-columns:1fr 280px;}
@media(max-width:640px){.gbody{grid-template-columns:1fr;}.gright{border-left:none;border-top:1px solid var(--line);}}
.gleft{padding:1.5rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;border-right:1px solid var(--line);}
.gright{padding:1.1rem;display:flex;flex-direction:column;align-items:center;gap:0.9rem;background:var(--bg2);}
.ctag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;color:var(--ink3);text-transform:uppercase;}
.ccard{background:white;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.ccard-top{display:flex;align-items:center;gap:5px;padding:6px 11px;border-bottom:1px solid var(--line);background:var(--bg2);}
.cdot{width:7px;height:7px;border-radius:50%;}
.cbody{padding:0.9rem 1.1rem;font-family:'DM Mono',monospace;font-size:12px;line-height:1.95;color:var(--ink2);white-space:pre-wrap;}
.cbody .hl{color:var(--ink);font-weight:500;}
.cbody .cm{color:var(--ink3);font-style:italic;}
.cbody .kw{color:var(--sage);}
.cbody .r{color:#c85a5a;}
.cbody .b{color:#5a7ec8;}
.cbody .ex{display:block;background:var(--bg2);border:1px solid var(--line);border-radius:5px;padding:6px 10px;margin:4px 0;font-size:11.5px;line-height:1.7;color:var(--ink);}
.cbody .why{display:block;background:rgba(168,158,200,0.1);border:1px solid rgba(168,158,200,0.3);border-radius:5px;padding:6px 10px;margin:4px 0;font-size:11.5px;color:#4a4470;line-height:1.6;}
.qbadge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--ink3);display:inline-block;margin-bottom:6px;}
.qbadge.open{border-color:rgba(168,158,200,0.4);color:#4a4470;background:rgba(168,158,200,0.08);}
.qbadge.qcm{border-color:rgba(122,158,135,0.4);color:#3d6b4f;background:rgba(122,158,135,0.08);}
.qtext{font-size:14.5px;font-weight:400;color:var(--ink);line-height:1.6;}
.choices{display:flex;flex-direction:column;gap:5px;}
.choice{padding:9px 13px;border-radius:8px;border:1px solid var(--line);background:white;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;text-align:left;transition:all 0.11s;line-height:1.5;}
.choice:hover:not(:disabled){border-color:var(--ink3);background:var(--bg2);}
.choice.ok{background:rgba(122,158,135,0.1);border-color:var(--sage);color:#3d6b4f;}
.choice.no{background:rgba(232,165,152,0.1);border-color:var(--blush);color:#8b4a3e;}
.choice.dim{opacity:0.3;cursor:default;}
.open-wrap{display:flex;gap:7px;align-items:center;}
.open-input{flex:1;font-family:'DM Mono',monospace;font-size:13px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink);outline:none;}
.open-input:focus{border-color:var(--lav);}
.open-btn{font-family:'DM Mono',monospace;font-size:11px;padding:9px 14px;border-radius:8px;background:var(--ink);color:var(--bg);border:none;cursor:pointer;}
.open-btn:hover{opacity:0.75;}
.fb{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--ink2);line-height:1.7;padding:8px 12px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);display:none;}
.fb.show{display:block;}
.fb.ok{border-color:rgba(122,158,135,0.35);color:#3d6b4f;background:rgba(122,158,135,0.07);}
.fb.no{border-color:rgba(232,165,152,0.35);color:#8b4a3e;background:rgba(232,165,152,0.07);}
.fb.hint{border-color:rgba(200,168,112,0.35);color:#7a5e1e;background:rgba(200,168,112,0.07);}
.gactions{display:flex;gap:7px;align-items:center;}
.btnext{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.06em;padding:7px 16px;border-radius:999px;background:var(--ink);color:var(--bg);border:none;cursor:pointer;display:none;}
.btnext:hover{opacity:0.75;}
.btnext.show{display:block;}
.btnhint{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);border:1px solid var(--line);background:none;border-radius:999px;padding:7px 12px;cursor:pointer;}
.btnhint:hover{color:var(--ink2);}
.glbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;color:var(--ink3);text-transform:uppercase;align-self:flex-start;}
.grid-outer{background:white;border:1px solid var(--line);border-radius:11px;padding:6px;}
.grid{display:grid;grid-template-columns:repeat(6,36px);grid-template-rows:repeat(6,36px);gap:2px;}
.gcell{width:36px;height:36px;border-radius:5px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.2s;}
.gcell.trace{background:rgba(122,158,135,0.1);}
.gcell.trace::after{content:'·';color:var(--sage);font-size:15px;}
.gcell.goal{background:rgba(122,158,135,0.12);}
.gcell.robot{background:transparent;}
.mlog{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);align-self:flex-start;min-height:14px;}
.win{display:none;position:fixed;inset:0;background:rgba(250,248,244,0.97);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:1.1rem;padding:2rem;text-align:center;overflow-y:auto;}
.win.show{display:flex;}
.win-robot{font-size:36px;animation:bob 2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.win-title{font-family:'DM Mono',monospace;font-size:14px;color:var(--ink);}
.win-msgs{background:white;border:1px solid var(--line);border-radius:11px;padding:1rem 1.3rem;text-align:left;max-width:500px;width:100%;}
.win-msgs-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:9px;}
.win-msgs ul{list-style:none;display:flex;flex-direction:column;gap:6px;}
.win-msgs li{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--ink2);line-height:1.6;padding-left:13px;position:relative;}
.win-msgs li::before{content:'→';position:absolute;left:0;color:var(--sage);}
.win-btns{display:flex;gap:7px;}
.btn-restart{font-family:'DM Mono',monospace;font-size:11px;padding:8px 18px;border-radius:999px;background:var(--ink);color:var(--bg);border:none;cursor:pointer;}
.btn-restart:hover{opacity:0.75;}
.btn-menu{font-family:'DM Mono',monospace;font-size:11px;padding:8px 18px;border-radius:999px;background:none;color:var(--ink2);border:1px solid var(--line);cursor:pointer;}
.btn-menu:hover{border-color:var(--ink3);color:var(--ink);}
.pt{position:fixed;pointer-events:none;border-radius:50%;animation:fup 1s ease-out forwards;z-index:999;}
@keyframes fup{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-55px) scale(0);opacity:0}}
</style>
</head>
<body>

<div class="screen active" id="s-home">
  <div class="home-logo">denis · sciences exactes</div>
  <div class="home-title">biochimie</div>
  <div class="home-sub">module 15 · acides aminés · protéines · ADN · enzymes · métabolisme<br>15 questions par notion · du débutant au niveau médical</div>

</div>

<div class="screen" id="s-game">
  <div class="topbar">
    <button class="btnback" onclick="goHome()">← biochimie</button>
    <span style="color:var(--ink3);font-size:12px;">/</span>
    <span class="tmod" id="g-title"></span>
    <div class="spacer"></div>

  </div>
  <div class="dots-row" id="dots-row"></div>

    <div class="gleft">
      <div class="ctag" id="g-ctag"></div>
      <div class="ccard">
        <div class="ccard-top">
          <div class="cdot" style="background:#e8a598"></div>
          <div class="cdot" style="background:#e8d498"></div>
          <div class="cdot" style="background:#a8c8a0"></div>
        </div>

      </div>
      <div>
        <div class="qbadge" id="g-qbadge"></div>

      </div>
      <div class="choices" id="g-choices"></div>
      <div class="open-wrap" id="g-open" style="display:none;">
        <input class="open-input" id="g-input" placeholder="tape ta réponse..." onkeydown="if(event.key==='Enter')checkOpen()">
        <button class="open-btn" onclick="checkOpen()">→</button>
      </div>
      <div class="fb" id="g-fb"></div>

      <div class="glbl">progression</div>
      <div class="grid-outer"><div class="grid" id="grid"></div></div>
      <div class="mlog" id="g-mlog">en attente...</div>
    </div>
  </div>
</div>

<div class="win" id="win">
  <div class="win-robot">🤖</div>
  <div class="win-title" id="win-title"></div>
  <div class="win-msgs">
    <div class="win-msgs-lbl">take_home_messages[]</div>
    <ul id="win-list"></ul>
  </div>
  <div class="win-btns">
    <button class="btn-restart" onclick="restartChap()">↺ recommencer</button>
    <button class="btn-menu" onclick="goHome()">chapitres</button>
  </div>
</div>

<script>
const CHAPTERS = [

// ══════════════════════════════════════════════════════
// 15A — ACIDES AMINÉS ET PROTÉINES
// ══════════════════════════════════════════════════════
{id:"b1",sec:"module 15 · acides aminés et protéines",num:"15a",name:"acides aminés — structure et propriétés",level:"intermédiaire",
takeaway:[
  "20 acides aminés protéinogènes, tous L (configuration S sauf cystéine)",
  "Structure générale : H₂N−Cα(R)−COOH · pKa(COOH)~2, pKa(NH₃⁺)~9-10",
  "pI = (pKa1+pKa2)/2 pour AA non ionisables ; inclut pKa chaîne latérale si ionisable",
  "À pH physiologique (7.4) : forme zwitterion NH₃⁺/COO⁻",
  "Classement par chaîne latérale : apolaires, polaires, acides, basiques",
  "Liaisons disulfure Cys−Cys : stabilisation des protéines",
  "Acides aminés essentiels (non synthétisés) : His, Ile, Leu, Lys, Met, Phe, Thr, Trp, Val"
],
questions:[
{c:"Q1 · structure générale",type:"qcm",
code:`<span class="cm">// acide aminé — structure générale</span>
H₂N−<span class="hl">Cα</span>(R)−COOH
groupe α-amino (−NH₂) · groupe α-carboxyle (−COOH)
chaîne latérale R (variable selon l'AA)
<span class="cm">// tous les 20 AA protéinogènes ont cette structure</span>
<span class="why">// Cα = carbone alpha = centre chiral (sauf glycine R=H)</span>`,
q:"Quel est le seul acide aminé sans carbone asymétrique ?",
ch:["Alanine","Glycine (R=H — deux fois H sur Cα)","Valine","Proline"],ok:1,
hint:"pour qu'il y ait un carbone asymétrique, les 4 groupes doivent être différents",
fb_ok:"// correct — glycine : Cα lié à NH₂, COOH, H, H → deux H identiques → pas de carbone asymétrique.",
fb_no:"// glycine : R=H → Cα lié à NH₂, COOH, H, H → 2 groupes identiques → achiral.",mv:{dx:1,dy:0}},

{c:"Q2 · pKa et zwitterion",type:"qcm",
code:`<span class="cm">// acide aminé — états d'ionisation</span>
pH très bas   : ⁺H₃N−CH(R)−COOH      (dicationique)
pH interméd.  : ⁺H₃N−CH(R)−COO⁻     (zwitterion)
pH très élevé :  H₂N−CH(R)−COO⁻      (anionique)
<span class="hl">pKa(COOH) ≈ 2 · pKa(NH₃⁺) ≈ 9-10</span>
pI = (pKa1 + pKa2) / 2`,
q:"À pH physiologique (7.4), l'alanine (pI≈6) est sous quelle forme principale ?",
ch:["H₂N−CH(CH₃)−COOH (neutre non ionisé)","⁺H₃N−CH(CH₃)−COO⁻ (zwitterion)","H₂N−CH(CH₃)−COO⁻ (anionique)","⁺H₃N−CH(CH₃)−COOH (cationique)"],ok:1,
hint:"à pH physiologique (7.4), entre pKa1(~2) et pKa2(~9) → zwitterion",
fb_ok:"// correct — pH 7.4 est entre pKa1(2) et pKa2(9.7) → zwitterion ⁺NH₃/COO⁻.",
fb_no:"// entre les deux pKa → les deux groupes sont ionisés → zwitterion.",mv:{dx:0,dy:-1}},

{c:"Q3 · classification des chaînes latérales",type:"qcm",
code:`<span class="cm">// classification par chaîne latérale R</span>
<span class="kw">apolaires</span>  : Gly, Ala, Val, Leu, Ile, Pro, Phe, Trp, Met
<span class="kw">polaires</span>   : Ser, Thr, Cys, Tyr, Asn, Gln
<span class="kw">acides</span>     : Asp (pKa~4), Glu (pKa~4)
<span class="kw">basiques</span>   : Lys (pKa~10), Arg (pKa~12), His (pKa~6)
<span class="why">// His : seul AA basique avec pKa proche du pH physiologique
// → catalyseur acido-basique dans les enzymes</span>`,
q:"L'histidine (His) est unique parmi les AA basiques car son pKa de chaîne latérale (~6) est proche du pH physiologique. Quelle conséquence fonctionnelle ?",
ch:["Elle est toujours protonée","Elle peut jouer un rôle de catalyseur acido-basique dans les enzymes — accepter/donner H⁺ à pH physiologique","Elle est insoluble à pH 7","Elle est l'AA le plus fréquent"],ok:1,
hint:"pKa proche de pH = équilibre dynamique entre formes protonée/déprotonée → catalyse",
fb_ok:"// correct — His pKa~6 : à pH 7.4, ~90% neutre. Mais l'équilibre rapide permet la catalyse enzymatique.",
fb_no:"// His avec pKa~6 peut osciller entre protonée/déprotonée à pH physio → catalyseur acido-basique idéal.",mv:{dx:1,dy:0}},

{c:"Q4 · calcul de pI",type:"open",
code:`<span class="cm">// pI — calcul</span>
AA non ionisable : pI = (pKa1 + pKa2) / 2
<span class="ex">glycine : pKa(COOH)=2.34 · pKa(NH₃⁺)=9.60
  pI = (2.34+9.60)/2 = 5.97</span>
AA ionisable : prendre les deux pKa encadrant la forme neutre`,
q:"Calcule le pI de l'alanine : pKa(COOH)=2.35 et pKa(NH₃⁺)=9.87",
keys:["6.11","6,11","6.1","6,1"],
hint:"pI = (2.35+9.87)/2",
fb_ok:"// correct — pI = (2.35+9.87)/2 = 12.22/2 = 6.11.",
fb_no:"// pI = (2.35+9.87)/2 = 6.11.",mv:{dx:0,dy:-1}},

{c:"Q5 · pI de l'acide aspartique",type:"qcm",
code:`<span class="cm">// pI d'un AA acide (chaîne latérale ionisable)</span>
acide aspartique : pKa1(COOH)=2.10 · pKa2(COO⁻ latérale)=3.86 · pKa3(NH₃⁺)=9.82
<span class="hl">forme neutre nette = à pH entre pKa1 et pKa2</span>
pI = (pKa1 + pKa2) / 2 = (2.10+3.86)/2 = 2.98
<span class="why">// pI très bas pour les AA acides → chargés négativement à pH physiologique
// point isoélectrique est au-dessous de 7 pour les AA acides
// au-dessus de 7 pour les AA basiques</span>`,
q:"Pourquoi les acides aminés acides (Asp, Glu) ont-ils un pI << 7 ?",
ch:["Car ils sont solubles","Car ils ont une chaîne latérale acide supplémentaire qui abaisse le pI vers les valeurs acides","Car ils sont apolaires","Par convention arbitraire"],ok:1,
hint:"une chaîne latérale acide supplémentaire = un troisième groupe ionisable côté acide",
fb_ok:"// correct — chaîne latérale −COOH supplémentaire → 2 groupes acides → pI dans la zone acide.",
fb_no:"// AA acide = chaîne R avec −COOH (pKa~4) → 2 groupes acides → pI entre pKa1 et pKa2 (acides).",mv:{dx:1,dy:0}},

{c:"Q6 · acides aminés essentiels",type:"qcm",
code:`<span class="cm">// acides aminés essentiels — non synthétisés par l'humain</span>
His · Ile · Leu · Lys · Met · Phe · Thr · Trp · Val
(9 essentiels chez l'adulte, 10 chez l'enfant : + Arg)
<span class="why">// carences alimentaires :
// tryptophane → précurseur sérotonine + niacine (B3)
// phénylalanine → précurseur tyrosine (dopamine, mélanine)
// lysine → peu présente dans les céréales → complémentation légumineuses
// méthionine → seul AA soufré essentiel</span>`,
q:"La phénylcétonurie (PKU) est due à l'absence de phénylalanine hydroxylase. Quelle est la conséquence directe ?",
ch:["Excès de tyrosine","Accumulation de phénylalanine (neurotoxique) + déficit en tyrosine","Déficit en tryptophane","Aucune conséquence si régime normal"],ok:1,
hint:"sans phénylalanine hydroxylase : Phe ne peut pas être convertie en tyrosine → accumule",
fb_ok:"// correct — PKU : Phe s'accumule (neurotoxique) + Tyr devient essentielle. Régime pauvre en Phe nécessaire.",
fb_no:"// phénylalanine hydroxylase : Phe → Tyr. Sans elle : Phe ↑ (toxique) + Tyr manque.",mv:{dx:0,dy:-1}},

{c:"Q7 · cystéine et ponts disulfure",type:"qcm",
code:`<span class="cm">// pont disulfure Cys−S−S−Cys</span>
2 cystéines + oxydation → pont disulfure + 2H⁺ + 2e⁻
liaison covalente forte → stabilise la structure 3D des protéines
<span class="ex">insuline : 2 chaînes polypeptidiques reliées par 2 ponts S−S
immunoglobulines : ponts S−S internes et entre chaînes
kératine (cheveux) : nombreux ponts S−S → solidité</span>
<span class="why">// permanente (frisage) : réduction des ponts S−S + reformage en position courbe
// les protéines cellulaires n'ont généralement pas de ponts S−S (milieu réducteur)
// les protéines sécrétées oui (milieu oxydant du RE et extracellulaire)</span>`,
q:"Les ponts disulfure des protéines extracellulaires se forment dans le réticulum endoplasmique (RE). Pourquoi pas dans le cytoplasme ?",
ch:["Car le cytoplasme est trop chaud","Le cytoplasme est réducteur (glutathion réduit) → ponts S−S seraient réduits. Le RE est oxydant → formation favorisée","Car les Cys ne sont pas dans le cytoplasme","Par hasard évolutif"],ok:1,
hint:"milieu réducteur = ponts S−S instables ; milieu oxydant = formation favorisée",
fb_ok:"// correct — cytoplasme réducteur (GSH, thiorédoxine) → ponts S−S réduits. RE oxydant → formation et stabilisation.",
fb_no:"// cytoplasme réducteur (glutathion, thiorédoxine) → ponts S−S instables. RE oxydant → formation favorable.",mv:{dx:1,dy:0}},

{c:"Q8 · séparation par électrophorèse",type:"qcm",
code:`<span class="cm">// électrophorèse — migration selon charge et taille</span>
à pH > pI : AA chargé négativement → migre vers l'anode (+)
à pH < pI : AA chargé positivement → migre vers la cathode (−)
à pH = pI : charge nette = 0 → ne migre pas
<span class="why">// utilisation : SDS-PAGE (sépare selon masse)
// électrofocalisation isoélectrique (IEF) : sépare selon pI
// 2D-PAGE : IEF + SDS-PAGE → résolution maximale
// identifie les protéines dans un échantillon biologique</span>`,
q:"On réalise une électrophorèse à pH=6. La lysine (pI=9.74) migre vers :",
ch:["L'anode — car pH > pI","La cathode — car pH < pI : lysine chargée positivement","Ne migre pas — au point isoélectrique","L'anode et la cathode simultanément"],ok:1,
hint:"pH=6 < pI=9.74 → lysine pas encore à son pI → encore chargée positivement → vers cathode (−)",
fb_ok:"// correct — pH < pI → lysine protonée → chargée + → migre vers cathode (−).",
fb_no:"// pH < pI → plus protonée → charge positive → électrophorèse vers cathode (−).",mv:{dx:0,dy:-1}},

{c:"Q9 · acides aminés et neurotransmetteurs",type:"qcm",
code:`<span class="cm">// précurseurs de neurotransmetteurs</span>
<span class="kw">tryptophane</span> → sérotonine (5-HT) + mélatonine
<span class="kw">tyrosine</span>    → dopamine → noradrénaline → adrénaline
<span class="kw">histidine</span>   → histamine
<span class="kw">glutamate</span>   → GABA (acide γ-aminobutyrique)
<span class="why">// IRS (inhibiteurs recapture sérotonine) : bloquent la recapture de 5-HT
// L-DOPA : précurseur de dopamine, traverse BBB (contrairement à dopamine)

q:"Pourquoi prescrit-on la L-DOPA (et pas la dopamine directement) dans la maladie de Parkinson ?",

{c:"Q10 · piège — pKa du groupement amine",type:"qcm",
code:`<span class="cm">// PIÈGE : pKa de NH₂ ou de NH₃⁺ ?</span>
pKa(NH₃⁺) ≈ 9-10 signifie que NH₃⁺ est un acide (donne H⁺)
NH₃⁺ ⇌ NH₂ + H⁺  Ka → pKa
<span class="r">⚠️ le pKa est celui de la forme ACIDE (NH₃⁺) !</span>
→ à pH < pKa : forme NH₃⁺ (protonée) majoritaire
→ à pH > pKa : forme NH₂ (déprotonée) majoritaire`,
q:"La lysine a pKa(ε-NH₃⁺)=10.5. À pH 7.4, la chaîne latérale de la lysine est :",
ch:["Déprotonée (−NH₂) — car pH < pKa","Protonée (−NH₃⁺) — car pH < pKa → forme acide majoritaire","50/50","Dépend de la protéine"],ok:1,
hint:"pH 7.4 < pKa 10.5 → forme protonée (NH₃⁺) majoritaire",
fb_ok:"// correct — pH < pKa → forme protonée NH₃⁺ majoritaire. Lysine est chargée + à pH physiologique.",
fb_no:"// pH < pKa → forme protonée (NH₃⁺) domine. Lysine : chargée + à pH 7.4.",mv:{dx:0,dy:-1}},

{c:"Q11 · piège — electrophorèse et pI",type:"qcm",
code:`<span class="cm">// PIÈGE : direction de migration en électrophorèse</span>
pH > pI → charge nette négative → migre vers anode (+)
pH < pI → charge nette positive → migre vers cathode (−)
<span class="cm">// moyen mnémotechnique :</span>
pH<pI → positif → cathode (c/c)
pH>pI → négatif → anode (a/a)`,
q:"On mélange Gly (pI=6), Asp (pI=2.98) et Lys (pI=9.74) et on fait une électrophorèse à pH=6. Quel AA ne migre pas ?",

hint:"ne migre pas quand pH = pI",
fb_ok:"// correct — Gly (pI=6) = pH → charge nulle → immobile. Asp(pI=2.98): pH>pI → vers anode. Lys(pI=9.74): pH<pI → vers cathode.",
fb_no:"// pH = pI → charge nulle → pas de migration. Gly (pI=6) au pH=6.",mv:{dx:1,dy:0}},

{c:"Q12 · piège — acide aminé essentiel conditionnellement",type:"qcm",

certains AA sont essentiels dans des conditions particulières :
tyrosine : essentielle si déficit en phénylalanine hydroxylase (PKU)
arginine : essentielle pour la croissance (enfant) ou stress
glutamine : essentielle en cas de stress/chirurgie/brûlures
<span class="why">// "essentiel" = ne peut pas être synthétisé en quantité suffisante

hint:"stress intense → demande très élevée → synthèse insuffisante",
fb_ok:"// correct — stress intense (brûlures, sepsis, chirurgie) → consommation de glutamine >> synthèse → conditionnellement essentielle.",
fb_no:"// brûlures graves : catabolisme intensif → glutamine consommée plus vite que synthétisée → essentiellement conditionnelle.",mv:{dx:0,dy:-1}},

{c:"Q13 · complexe — tampons physiologiques",type:"qcm",
code:`<span class="cm">// acides aminés comme tampons — histidine</span>
histidine imidazole : pKa~6 → tampon physiologique intracellulaire
hémoglobine : riche en His → tampon du CO₂ dans les GR
CO₂ + H₂O → H₂CO₃ → HCO₃⁻ + H⁺
H⁺ capté par His de l'hémoglobine → effet Bohr
<span class="why">// effet Bohr : ↑CO₂ (muscles actifs) → ↑H⁺ → protonation His Hb
// → ↓ affinité Hb pour O₂ → libération O₂ aux muscles !</span>`,
q:"L'effet Bohr décrit comment la libération d'O₂ par l'hémoglobine est favorisée dans les tissus actifs. Le mécanisme implique principalement :",
ch:["Une augmentation de la température uniquement","La protonation des résidus histidine de l'hémoglobine par le CO₂/H⁺ des tissus actifs → diminution de l'affinité pour O₂","Une modification de la membrane des GR","Une activation enzymatique"],ok:1,
hint:"CO₂ des muscles → H⁺ → His de Hb se protone → changement conformation → ↓ affinité O₂",
fb_ok:"// correct — effet Bohr : CO₂ → H⁺ → protonation His Hb → allostérie → ↓ affinité O₂ → libération aux muscles.",
fb_no:"// effet Bohr : CO₂+H₂O → H⁺. H⁺ + His(Hb) → HisH⁺(Hb) → ↓ affinité O₂ → déchargement aux tissues.",mv:{dx:1,dy:0}},

{c:"Q14 · complexe — modification post-traductionnelle",type:"qcm",
code:`<span class="cm">// modifications post-traductionnelles (MPT)</span>
phosphorylation   : Ser, Thr, Tyr + kinase → régulation
glycosylation     : Asn(N-lié) ou Ser/Thr(O-lié) → reconnaissance
hydroxylation     : Pro → hydroxyproline (collagène) — vitamine C nécessaire
acétylation       : Lys (histones) → expression génique
ubiquitination    : Lys → marquage pour dégradation (protéasome)
<span class="why">// environ 300 types de MPT connues
// augmentent la diversité fonctionnelle des ~20 000 protéines humaines</span>`,
q:"Le scorbut (déficit en vitamine C) provoque des lésions du tissu conjonctif. Quel mécanisme biochimique ?",

fb_no:"// vitamine C cofacteur prolyl-hydroxylase → hydroxyproline nécessaire pour triple hélice du collagène. Sans : collagène instable.",mv:{dx:0,dy:-1}},

{c:"Q15 · complexe — séquençage et maladies génétiques",type:"qcm",

drépanocytose : Glu(6) → Val dans la chaîne β-globine
→ HbS au lieu de HbA
→ Val est apolaire → agrégation des Hb désoxygénées → falciformation
<span class="why">// 1 seule substitution d'AA sur 287 → maladie grave

// avantage hétérozygote : résistance au paludisme (Plasmodium préfère HbA)</span>`,

hint:"un groupe apolaire en surface d'une protéine → interaction hydrophobe avec d'autres protéines",
fb_ok:"// correct — Val (apolaire) sur la surface → 'poignée hydrophobe' → s'insère dans la poche de l'HbS voisine → fibre → falciformation.",
fb_no:"// Val apolaire en surface → interaction hydrophobe avec poche complémentaire sur Hb voisine → polymérisation → corps falciforme.",mv:{dx:1,dy:0}},
]},

questions:[
{c:"Q1 · structure primaire",type:"qcm",
code:`<span class="cm">// structure primaire — séquence des AA</span>
liaison peptidique : R₁−CO−NH−R₂
déterminée par le gène (séquence ADN)
<span class="hl">la structure primaire détermine tout le reste</span>
<span class="why">// Anfinsen (Prix Nobel 1972) : la ribonucléase dénaturée
// se replie spontanément → la séquence suffit
// MAIS en pratique : les chaperonnes sont nécessaires pour de nombreuses protéines in vivo</span>`,

hint:"ribonucléase dénaturée → repliement spontané = même structure → même activité",
fb_ok:"// correct — Anfinsen : la séquence primaire contient toute l'information nécessaire au repliement.",
fb_no:"// Anfinsen : ribonucléase dénaturée se replie spontanément → structure primaire détermine structure 3D.",mv:{dx:1,dy:0}},

{c:"Q2 · hélice alpha",type:"qcm",
code:`<span class="cm">// hélice alpha — structure secondaire</span>
3.6 résidus/tour · montée de 1.5 Å/résidu
liaisons H : C=O(i) ···H−N(i+4)
<span class="hl">tous les groupes C=O et N−H participent aux liaisons H</span>
chaînes latérales R pointent vers l'extérieur
angles de Ramachandran : φ≈−57°, ψ≈−47°
<span class="why">// très stable : ~4 liaisons H par tour
// fréquente dans les segments transmembranaires (20 AA apolaires)
// kératine, myosine, collagène (triple hélice particulière)</span>`,
q:"Dans une hélice α, les liaisons hydrogène se forment entre :",
ch:["Les chaînes latérales R des résidus voisins","Le C=O du résidu i et le N−H du résidu i+4","Le N−H du résidu i et le C=O du résidu i+1","Les liaisons disulfure des cystéines"],ok:1,
hint:"les liaisons H se font le long de l'axe hélicoïdal entre résidus espacés de 4",
fb_ok:"// correct — C=O(i) ↔ H−N(i+4). Cette distance correspond à 1 tour d'hélice (3.6 résidus).",
fb_no:"// hélice α : liaison H entre C=O d'un résidu et N−H du résidu situé 4 positions plus loin.",mv:{dx:0,dy:-1}},

{c:"Q3 · feuillet bêta",type:"qcm",
code:`<span class="cm">// feuillet β — structure secondaire</span>
brins β : étendus, angles φ≈−119°, ψ≈+113°
liaisons H <span class="hl">entre brins voisins</span> (pas dans le même brin)
<span class="kw">parallèle</span>  : brins N→C dans le même sens
<span class="kw">antiparallèle</span>: brins N→C en sens opposés (plus stable)
<span class="why">// soie (fibroïne) : feuillets β antiparallèles → très résistante
// protéines amyloïdes (Alzheimer) : feuillets β empilés → agrégats toxiques
// bêta-barreau (porine) : canal membranaire</span>`,
q:"Les protéines amyloïdes impliquées dans la maladie d'Alzheimer (peptide Aβ) forment des agrégats de feuillets β. Pourquoi sont-ils difficiles à dégrader ?",
ch:["Car les protéases ne reconnaissent pas les feuillets β","Les feuillets β empilés sont très stables thermodynamiquement et résistants aux protéases (structure compacte peu accessible)","Car ils sont extracellulaires","Car le cerveau manque de protéases"],ok:1,
hint:"feuillets β empilés = structure très compacte et thermodynamiquement stable",
fb_ok:"// correct — feuillets β empilés = structure très stable, compacte, peu accessible aux protéases → accumulation.",
fb_no:"// feuillets β amyloïdes : extrêmement stables, compacts, résistants → accumulation → plaques séniles.",mv:{dx:1,dy:0}},

{c:"Q4 · forces de la structure tertiaire",type:"qcm",
code:`<span class="cm">// structure tertiaire — forces stabilisantes</span>
<span class="kw">effet hydrophobe</span>  : résidus apolaires → cœur de la protéine
<span class="kw">liaisons H</span>       : groupes polaires
<span class="kw">ponts disulfure</span>  : Cys−S−S−Cys (covalente → très forte)
<span class="kw">interactions ioniq.</span>: Asp/Glu(−) ↔ Lys/Arg(+)
<span class="why">// l'effet hydrophobe est la force DOMINANTE dans le repliement
// les résidus apolaires "fuient" l'eau → cœur hydrophobe
// c'est entropique (libère les molécules d'eau structurées)</span>`,
q:"L'effet hydrophobe est la force principale du repliement protéique. Cette force est de nature :",
ch:["Enthalpique — les résidus apolaires s'attirent","Entropique — les résidus apolaires regroupés libèrent les molécules d'eau structurées → gain d'entropie","Électrostatique","Covalente"],ok:1,
hint:"effet hydrophobe = gain d'entropie du solvant quand les résidus apolaires se regroupent",
fb_ok:"// correct — effet hydrophobe : entropique. Résidus apolaires regroupés → eau libérée → ΔS > 0 → ΔG < 0.",
fb_no:"// effet hydrophobe : résidus apolaires ensemble → eau libérée de sa 'cage' → ΔS(eau) ↑ → force entropique.",mv:{dx:0,dy:-1}},

{c:"Q5 · structure quaternaire",type:"qcm",
code:`<span class="cm">// structure quaternaire — assemblage de sous-unités</span>
<span class="ex">hémoglobine : 2α + 2β (tétramère)
  → coopérativité de liaison de l'O₂
insuline : dimère (stockée) · hexamère (avec Zn²⁺)
anticorps IgG : 2 chaînes lourdes + 2 chaînes légères
ATP synthase : complexe multiprotéique rotatif (8+ sous-unités)</span>
<span class="why">// la structure quaternaire permet la coopérativité :
// liaison du 1er O₂ à Hb → change conformation → facilite les 3 suivants
// courbe sigmoïde de liaison (S-shaped) = caractéristique de la coopérativité</span>`,
q:"L'hémoglobine montre une courbe de saturation sigmoïde (en S) pour O₂, contrairement à la myoglobine (courbe hyperbolique). Cela reflète :",
ch:["Une différence de structure primaire","La coopérativité allostérique — la liaison d'un O₂ augmente l'affinité des autres sous-unités pour O₂","Une différence de concentration","La présence du fer"],ok:1,
hint:"sigmoïde = coopérativité positive → chaque liaison facilite la suivante",
fb_ok:"// correct — courbe sigmoïde = coopérativité positive. 1er O₂ lié → changement conformationnel → ↑ affinité pour O₂ suivants.",
fb_no:"// courbe sigmoïde = coopérativité allostérique. Hb tétramère → 1er O₂ → T→R → ↑ affinité → courbe en S.",mv:{dx:1,dy:0}},

{c:"Q6 · dénaturation",type:"qcm",
code:`<span class="cm">// dénaturation — perte de la structure 3D</span>
agents dénaturants : chaleur · pH extrême · détergents (SDS) · urée/guanidinium
→ rompent les forces non-covalentes (et réduisent S−S si réducteur)
→ structure primaire <span class="hl">conservée</span>
<span class="kw">réversible</span>  : petites protéines simples (ribonucléase)
<span class="kw">irréversible</span>: grande majorité (agrégation des résidus hydrophobes exposés)
<span class="why">// œuf cuit : blanc d'albumine dénaturé irréversiblement
// cuisson = dénaturation des protéines alimentaires → meilleure digestibilité</span>`,
q:"Le SDS (dodécyl sulfate de sodium) est utilisé en électrophorèse pour dénaturer les protéines. Il agit en :",
ch:["Hydrolysant les liaisons peptidiques","S'associant aux résidus hydrophobes des protéines → les déplie → charge négative uniforme (1,4 g SDS/g protéine) → séparation par taille","Oxydant les ponts disulfure","Se liant au fer du groupe hème"],ok:1,
hint:"SDS = détergent anionique → se lie aux résidus hydrophobes → déplie + charge uniforme",
fb_ok:"// correct — SDS lie les résidus hydrophobes (~1 SDS/2 AA) → dépliement + charge uniforme → migration par taille seulement.",
fb_no:"// SDS = détergent. Lie résidus hydrophobes → déplie. Charge uniforme (−) → migration selon masse moléculaire.",mv:{dx:0,dy:-1}},

{c:"Q7 · chaperonnes moléculaires",type:"qcm",

HSP70 : lie les segments hydrophobes exposés (co-traductionnel)
GroEL/GroES (bactéries) = Hsp60/Hsp10 (mitochondrie)
→ chambre isolée → repliement à l'abri des agrégations
<span class="why">// sans chaperonnes : les résidus hydrophobes exposés pendant le repliement

Anfinsen : ribonucléase se replie spontanément in vitro

<span class="r">⚠️ la structure primaire détermine la structure native</span>

{c:"Q1 · structure de la double hélice",type:"qcm",

{c:"Q3 · réplication — semi-conservative",type:"qcm",
code:`<span class="cm">// réplication semi-conservative (Meselson & Stahl 1958)</span>
chaque brin parental sert de matrice

<span class="hl">brin discontinu</span> (lagging) : fragments d'Okazaki + ADN ligase
<span class="why">// chaque cellule fille reçoit une copie exacte de l'ADN

{c:"Q4 · maturation de l'ARNm",type:"qcm",

{c:"Q6 · mutations et code génétique",type:"qcm",
code:`<span class="cm">// types de mutations ponctuelles</span>
<span class="kw">silencieuse</span>  : même AA (dégénérescence) → pas de changement protéique
<span class="kw">faux sens</span>    : AA différent → protéine modifiée (peut être grave ou non)
<span class="kw">non-sens</span>     : codon stop prématuré → protéine tronquée (grave)
<span class="kw">décalage</span>     : insertion/délétion → tous les codons suivants changés (grave)
<span class="ex">drépanocytose : GAG→GTG = Glu→Val (faux sens grave)
mucoviscidose : ΔF508 = délétion de 3 pb = perte de Phe (faux sens)</span>`,
q:"Une mutation crée un codon stop prématuré (mutation non-sens) dans le milieu d'un gène. La conséquence est :",
ch:["La protéine est plus stable","La traduction s'arrête prématurément → protéine tronquée, généralement non-fonctionnelle et dégradée","La protéine est plus longue","La transcription est bloquée"],ok:1,
hint:"codon stop = signal d'arrêt de la traduction",
fb_ok:"// correct — stop prématuré → protéine tronquée → généralement non-fonctionnelle → dégradée par NMD (nonsense-mediated decay).",
fb_no:"// codon stop = arrêt de la traduction → protéine tronquée. NMD (nonsense-mediated decay) détruit souvent l'ARNm.",mv:{dx:0,dy:-1}},

{c:"Q7 · réparation de l'ADN",type:"qcm",
code:`<span class="cm">// systèmes de réparation de l'ADN</span>
<span class="kw">BER</span> (base excision repair) : bases endommagées
<span class="kw">NER</span> (nucleotide excision repair) : lésions volumineuses (UV → thymidine dimers)
<span class="kw">MMR</span> (mismatch repair) : erreurs de réplication
<span class="kw">DSBR</span> (double strand break repair) : NHEJ ou recombinaison homologue

hint:"sans MMR : les erreurs s'accumulent → mutations dans des gènes importants",
fb_ok:"// correct — sans MMR : erreurs de réplication non corrigées → mutations progressives → instabilité microsatellitaire → cancer.",
fb_no:"// MMR déficient → erreurs de réplication accumulées → mutations dans gènes critiques (KRAS, APC, TP53...) → cancer.",mv:{dx:1,dy:0}},

{c:"Q9 · télomères et vieillissement",type:"qcm",
code:`<span class="cm">// télomères — protection des extrémités chromosomiques</span>

{c:"Q12 · piège — ADN polymérase vs ARN polymérase",type:"qcm",
code:`<span class="cm">// PIÈGE : ADN pol vs ARN pol</span>

{id:"b4",sec:"module 15 · enzymes",num:"15d",name:"cinétique enzymatique et inhibition",level:"avancé",
takeaway:[
  "Km = [S] pour v = Vmax/2 — mesure de l'affinité (petit Km = forte affinité)",
  "Équation de Michaelis-Menten : v = Vmax[S]/(Km+[S])",
  "Inhibition compétitive : Km↑, Vmax inchangé — surmontable par excès de substrat",
  "Inhibition non-compétitive : Vmax↓, Km inchangé — non surmontable",
  "Inhibition irréversible : covalente avec le site actif (ex: aspirine, organophosphorés)",
  "Régulation allostérique : effeteur lie un site distant → changement conformationnel",
  "kcat/Km = efficacité catalytique (limit diffusion : ~10⁸ M⁻¹s⁻¹)"
],
questions:[
{c:"Q1 · Km et affinité",type:"qcm",
code:`<span class="cm">// Km — constante de Michaelis</span>
Km = [S] quand v = Vmax/2
petit Km → grande <span class="hl">affinité</span> pour le substrat
grand Km → faible affinité
<span class="ex">hexokinase (cerveau) : Km(glucose) = 0.05 mM → haute affinité
glucokinase (foie)  : Km(glucose) = 10 mM → faible affinité</span>
<span class="why">// hexokinase capte le glucose même à faible concentration (cerveau prioritaire)
// glucokinase active seulement après un repas (glucose ↑) → captage hépatique proportionnel</span>`,
q:"Hexokinase (Km=0.05 mM) vs glucokinase (Km=10 mM) — à jeun (glycémie ~4 mM), quelle enzyme est la plus active ?",
ch:["Glucokinase — plus grande Vmax","Hexokinase — son Km est << 4 mM donc elle est saturée et fonctionne à Vmax. Glucokinase : Km >> 4 mM → peu active","Les deux sont également actives","Glucokinase — présente dans plus de tissus"],ok:1,
hint:"à [S] >> Km → enzyme saturée → v ≈ Vmax. À [S] << Km → v faible",
fb_ok:"// correct — hexokinase Km=0.05 mM << 4 mM → saturée → v ≈ Vmax. Glucokinase Km=10 mM >> 4 mM → peu active à jeun.",
fb_no:"// [S]=4 mM >> Km hexokinase(0.05) → saturée. [S]=4 mM << Km glucokinase(10) → peu active à jeun.",mv:{dx:1,dy:0}},

{c:"Q2 · équation de Michaelis-Menten",type:"open",
code:`<span class="cm">// v = Vmax × [S] / (Km + [S])</span>
si [S] = Km → v = Vmax × Km / (Km + Km) = <span class="hl">Vmax/2</span>
si [S] >> Km → v ≈ Vmax   (ordre 0 en S)
si [S] << Km → v ≈ Vmax×[S]/Km  (ordre 1 en S)`,
q:"Vmax = 100 μmol/min, Km = 2 mM, [S] = 8 mM. Calcule v (μmol/min).",
keys:["80","80 µmol","80μmol","80 umol"],
hint:"v = 100×8/(2+8) = 800/10",
fb_ok:"// correct — v = 100×8/(2+8) = 800/10 = 80 μmol/min.",
fb_no:"// v = Vmax×[S]/(Km+[S]) = 100×8/(2+8) = 800/10 = 80 μmol/min.",mv:{dx:0,dy:-1}},

{c:"Q3 · inhibition compétitive",type:"qcm",
code:`<span class="cm">// inhibition compétitive</span>
inhibiteur ressemble au substrat → lie le <span class="hl">site actif</span>
→ <span class="hl">Km apparent ↑</span>   (affinité apparente ↓)
→ <span class="hl">Vmax inchangé</span>   (surmontable par excès de S)
<span class="ex">statines (simvastatine) : inhibiteurs compétitifs de HMG-CoA réductase
méthotrexate : inhibiteur compétitif de la dihydrofolate réductase</span>`,
q:"Un médicament augmente le Km apparent sans changer Vmax. C'est :",
ch:["Inhibiteur non-compétitif","Inhibiteur compétitif — lie le site actif, surmontable par excès de substrat","Activateur allostérique","Inhibiteur irréversible"],ok:1,
hint:"Km↑ + Vmax inchangé = signature de l'inhibition compétitive",
fb_ok:"// correct — Km↑ + Vmax inchangé = inhibition compétitive. Surmontable par excès de substrat.",
fb_no:"// Km↑ + Vmax inchangé = compétitif. Surmontable : si [S]↑ → déplace l'inhibiteur du site actif.",mv:{dx:1,dy:0}},

{c:"Q4 · inhibition non-compétitive",type:"qcm",
code:`<span class="cm">// inhibition non-compétitive</span>
inhibiteur lie un site <span class="hl">allostérique</span> (≠ site actif)
→ <span class="hl">Vmax ↓</span>   (non surmontable par excès de S)
→ <span class="hl">Km inchangé</span>  (affinité pour S non modifiée)
<span class="ex">cyanures (CN⁻) : lient le fer du complexe IV (hème) irréversible
theophylline : inhibiteur des phosphodiestérases (non compétitif)</span>`,
q:"Un inhibiteur diminue Vmax mais ne change pas Km. C'est :",
ch:["Inhibition compétitive","Inhibition non-compétitive — lie un site allostérique","Inhibition substrat excess","Activation allostérique"],ok:1,
hint:"Vmax↓ + Km inchangé = non-compétitif",
fb_ok:"// correct — Vmax↓ + Km inchangé = inhibition non-compétitive. Non surmontable par excès de substrat.",
fb_no:"// Vmax↓ + Km inchangé = non-compétitif. Site allostérique → impossible à surmonter par excès de substrat.",mv:{dx:0,dy:-1}},

{c:"Q5 · inhibition irréversible",type:"qcm",
code:`<span class="cm">// inhibition irréversible — liaison covalente</span>
l'inhibiteur forme une <span class="hl">liaison covalente</span> avec le site actif
→ enzyme inactivée de façon permanente
→ activité ne revient que si nouvelle enzyme synthétisée
<span class="ex">aspirine : acétyle la COX-1/COX-2 (Ser530) irréversiblement
IMAO irréversibles : phénelzine → MAO inactivée définitivement
organophosphorés (sarin, tabun) : phosphorylent AChE irréversiblement</span>`,

ch:["Car les plaquettes n'ont pas de cytoplasme","Les plaquettes sont anucléées → ne peuvent pas synthétiser de nouvelles protéines → l'effet dure la vie entière de la plaquette (~7-10 jours)","Car l'aspirine reste dans les plaquettes","Car les plaquettes n'ont pas de COX"],ok:1,
hint:"les plaquettes n'ont pas de noyau → pas de synthèse de nouvelles protéines",
fb_ok:"// correct — plaquettes anucléées → pas de synthèse protéique → COX-1 inactivée pour toute la vie de la plaquette (~7j) → antiagrégant durable.",
fb_no:"// plaquettes : pas de noyau → pas de synthèse protéique. COX-1 acétylée irréversiblement → effet dure 7-10 jours.",mv:{dx:1,dy:0}},

{c:"Q6 · régulation allostérique",type:"qcm",
code:`<span class="cm">// enzymes allostériques</span>
effecteur positif (+) : ↑ activité (active)
effecteur négatif (−) : ↓ activité (inhibe)
<span class="kw">rétro-inhibition</span> : le produit final inhibe la 1ère enzyme de la voie
<span class="ex">threonine déhydratase : inhibée par l'isoleucine (produit final)
ATP inhibe la phosphofructokinase (PFK) → stoppe la glycolyse si E suffisante
AMP active la PFK → accélère la glycolyse si E manque</span>`,
q:"La phosphofructokinase-1 (PFK-1, étape clé de la glycolyse) est inhibée par l'ATP et activée par l'AMP. Ce mécanisme de régulation est :",
ch:["Un gaspillage d'énergie","Une régulation allostérique par l'état énergétique de la cellule — ATP↑ = énergie suffisante = freiner glycolyse · AMP↑ = manque d'énergie = accélérer glycolyse","Une inhibition compétitive par l'ATP","Une régulation transcriptionnelle"],ok:1,
hint:"ATP = énergie disponible = inhiber production supplémentaire",
fb_ok:"// correct — allostérie par statut énergétique. ATP↑ → freine glycolyse (inutile). AMP↑ → accélère glycolyse (besoin d'ATP).",
fb_no:"// régulation allostérique par énergie : ATP (plein = stop) · AMP (vide = go). Rétrocontrôle élégant.",mv:{dx:0,dy:-1}},

{c:"Q7 · statines et HMG-CoA réductase",type:"qcm",
code:`<span class="cm">// statines — inhibiteurs HMG-CoA réductase</span>
HMG-CoA réductase : étape limitante de la biosynthèse du cholestérol
statines (simvastatine, atorvastatine) : analogues de HMG-CoA + mévalonate
→ inhibition compétitive → ↓ cholestérol intracellulaire
→ ↑ LDLR (récepteur LDL) → ↓ LDL plasmatique
<span class="why">// effet pléiotrope : anti-inflammatoire, stabilisation plaque
// myopathie : effet indésirable lié à ↓ ubiquinone (coQ10) - même voie
// atorvastatine : statine la plus prescrite au monde</span>`,
q:"Les statines réduisent la synthèse hépatique du cholestérol. Les hépatocytes compensent en surexprimant les récepteurs LDL (LDLR). Quel est l'effet net ?",
ch:["Le LDL plasmatique augmente","↑ LDLR → ↑ captation du LDL plasmatique → ↓ LDL plasmatique → ↓ risque cardiovasculaire","Le HDL diminue","Le cholestérol total reste inchangé"],ok:1,
hint:"plus de LDLR → plus de LDL capté → moins de LDL en circulation",
fb_ok:"// correct — ↓ synthèse intrahepatocytaire → ↑ LDLR → ↑ captation LDL plasmatique → ↓ LDL → ↓ athérosclérose.",

{c:"Q8 · organophosphorés et AChE",type:"qcm",
code:`<span class="cm">// organophosphorés — inhibiteurs irréversibles de l'AChE</span>
acétylcholinestérase (AChE) : hydrolyse l'acétylcholine (ACh) → choline + acétate
organophosphorés (sarin, malathion, parathion) :
→ phosphorylent Ser du site actif → AChE irréversiblement inhibée
→ accumulation ACh → convulsions · hypersécrétion · paralysie
<span class="why">// antidote : atropine (antagoniste muscarinique) + pralidoxime (2-PAM)
// pralidoxime régénère AChE si donné rapidement (avant vieillissement)
// insecticides organophosphorés = même mécanisme (selectivité relative insectes/humains)</span>`,
q:"L'antidote de l'intoxication aux organophosphorés (gaz neurotoxiques) comprend la pralidoxime (2-PAM). Elle agit en :",
ch:["Bloquant les récepteurs nicotiniques","Réactivant l'AChE en déplaçant le groupement phosphate du site actif (si donné avant le 'vieillissement' de l'enzyme)","Inhibant la synthèse d'ACh","Activant la MAO"],ok:1,

{c:"Q9 · enzymes et diagnostics biologiques",type:"qcm",
code:`<span class="cm">// enzymes plasmatiques comme marqueurs biologiques</span>
<span class="kw">créatine kinase (CK)</span>    : ↑ IDM · rhabdomyolyse · myopathie
<span class="kw">transaminases (ASAT/ALAT)</span>: ↑ hépatite · IDM (ASAT)
<span class="kw">troponines (T et I)</span>     : ↑ IDM · spécifiques du myocarde

<span class="kw">amylase/lipase</span>          : ↑ pancréatite

{c:"Q10 · piège — Km ≠ affinité absolue",type:"qcm",
code:`<span class="cm">// PIÈGE : Km reflète l'affinité mais ≠ Kd</span>
Km = (k₋₁ + kcat) / k₁
<span class="hl">si kcat << k₋₁ : Km ≈ Kd (vraie affinité)</span>
<span class="hl">si kcat >> k₋₁ : Km > Kd</span>
→ Km peut surestimer la vraie affinité
<span class="why">// implications : une enzyme avec un Km élevé n'a pas forcément
// une faible affinité si kcat est aussi très élevé
// la vrai affinité = Kd (constante de dissociation) ≠ Km</span>`,
q:"Enzyme A : Km=1 mM, kcat=10 s⁻¹. Enzyme B : Km=5 mM, kcat=1000 s⁻¹. Laquelle a la meilleure efficacité catalytique (kcat/Km) ?",
ch:["Enzyme A — plus petite Km","Enzyme B — kcat/Km = 1000/5=200 mM⁻¹s⁻¹ >> kcat/Km_A = 10/1=10 mM⁻¹s⁻¹","Identiques","Impossible à comparer"],ok:1,
hint:"efficacité = kcat/Km. Calculer les deux.",
fb_ok:"// correct — Enzyme B : 1000/5=200 >> Enzyme A : 10/1=10. Enzyme B 20× plus efficace malgré un Km plus grand.",
fb_no:"// kcat/Km : A = 10/1 = 10 mM⁻¹s⁻¹. B = 1000/5 = 200 mM⁻¹s⁻¹. B plus efficace malgré Km plus grand.",mv:{dx:0,dy:-1}},

{c:"Q11 · piège — inhibition compétitive surmontable",type:"qcm",
code:`<span class="cm">// PIÈGE : compétitif surmontable par excès de substrat</span>
inhibition compétitive : Km apparent ↑
→ si [S] très élevé → l'inhibiteur est 'dilué' dans le site actif
→ v peut atteindre Vmax quand même
<span class="r">⚠️ donc même en présence d'inhibiteur compétitif, Vmax est inchangé</span>
<span class="kw">clinique</span> : surdose en substrat peut 'lever' l'inhibition compétitive`,
q:"Un patient prend du méthotrexate (inhibiteur compétitif de la DHFR). Si on lui administre beaucoup de folate (substrat), l'effet du méthotrexate est-il annulé ?",
ch:["Oui — c'est une inhibition compétitive donc surmontable","Non — méthotrexate a une affinité pour DHFR >> folate (Kd ~1 nM vs Km folate ~1 μM). En pratique la levée est impossible à atteindre","Oui mais seulement partiellement","Non car méthotrexate est irréversible"],ok:1,
hint:"théoriquement surmontable, mais l'affinité du méthotrexate est 1000× plus grande",
fb_ok:"// correct — théoriquement surmontable, mais méthotrexate : Kd~1 nM vs folate Km~1 μM → ratio 1000 → impossible en pratique.",
fb_no:"// méthotrexate : affinité ~1000× > folate → surmontable théoriquement mais impossible en pratique. Traitement : leucovorine rescue.",mv:{dx:1,dy:0}},

{c:"Q12 · piège — enzyme allostérique vs michaelien",type:"qcm",
code:`<span class="cm">// PIÈGE : enzymes allostériques ≠ Michaelis-Menten</span>
enzyme michaelienne : courbe v vs [S] = hyperbolique
enzyme allostérique : courbe v vs [S] = <span class="hl">sigmoïde</span>
→ effet coopératif positif : la liaison d'un S facilite les suivants
<span class="ex">ATCase, hémoglobine (transport O₂, pas enzyme mais analogue)</span>
<span class="why">// la courbe sigmoïde = "switch" biochimique
// l'enzyme est peu active à faible [S], très active à haute [S]
// → évite une réponse graduelle → réponse "tout ou rien" plus nette</span>`,
q:"La courbe v/[S] de la pyruvate kinase (enzyme allostérique) est sigmoïde. Quelle implication fonctionnelle ?",
ch:["L'enzyme est moins efficace","La sigmoïde reflète la coopérativité — la pyruvate kinase est un 'commutateur métabolique' actif seulement quand le PEP dépasse un seuil","L'enzyme ne suit pas la cinétique Michaelis-Menten car elle est trop grande","La sigmoïde est une erreur expérimentale"],ok:1,
hint:"sigmoïde = effet seuil = commutateur biochimique",
fb_ok:"// correct — sigmoïde = coopérativité positive = commutateur. Pyruvate kinase inactive à faible PEP, très active au-dessus du seuil.",
fb_no:"// courbe sigmoïde = coopérativité = commutateur. Réponse 'switch' à un seuil de substrat → régulation précise.",mv:{dx:0,dy:-1}},

{c:"Q13 · complexe — inhibition enzymatique et thérapeutique",type:"qcm",
code:`<span class="cm">// exemples cliniques d'inhibiteurs enzymatiques</span>
<span class="kw">IEC</span> (captopril) : compétitif de l'enzyme de conversion → ↓ angiotensine II → ↓ PA
<span class="kw">gliptines</span> (sitagliptine) : compétitifs de DPP-4 → ↓ dégradation GLP-1 → ↑ insuline
<span class="kw">imatinib</span> (Gleevec) : compétitif ATP sur BCR-ABL kinase → LMC
<span class="kw">ritonavir</span> : inhibe protéase VIH → arrêt maturation virions
<span class="why">// ~50% des médicaments approuvés = inhibiteurs enzymatiques
// la connaissance de la structure 3D de l'enzyme → conception rationnelle des médicaments</span>`,
q:"L'imatinib (Gleevec) inhibe BCR-ABL en compétant avec l'ATP pour le site catalytique. Pourquoi cette approche est-elle difficile à appliquer à toutes les kinases ?",
ch:["Car toutes les kinases sont identiques","Le site de liaison ATP est très conservé entre les ~500 kinases humaines → un inhibiteur du site ATP risque d'inhiber d'autres kinases → effets indésirables. La sélectivité nécessite des interactions supplémentaires.","Car l'ATP est présent en trop grande concentration","Car les kinases ne peuvent pas être inhibées"],ok:1,

{c:"Q14 · complexe — cinétique à deux substrats",type:"qcm",
code:`<span class="cm">// réactions à deux substrats — mécanismes</span>
<span class="kw">séquentiel ordonné</span> : A se lie d'abord, puis B
<span class="kw">séquentiel aléatoire</span> : A ou B peuvent se lier en premier
<span class="kw">ping-pong</span> : A se lie, produit P libéré, B se lie → Q libéré
<span class="ex">aminotransférases (ASAT, ALAT) : mécanisme ping-pong
  Glu + OA → α-KG + Asp (via PLP comme groupe prosthétique)</span>
<span class="why">// ASAT et ALAT : mécanisme ping-pong
// le PLP (pyridoxal phosphate, B6) est transitoirement aminé
// puis transamine le cétoacide accepteur</span>`,
q:"Les transaminases (ASAT, ALAT) fonctionnent selon un mécanisme ping-pong avec le PLP (vitamine B6). Cela signifie :",
ch:["Les deux substrats se lient simultanément","Le groupe amine du premier substrat est transféré au PLP (enzyme aminée), puis transféré au second substrat — les deux substrats ne sont jamais présents simultanément sur l'enzyme","L'enzyme est allostérique","L'enzyme peut fonctionner sans cofacteur"],ok:1,
hint:"ping-pong = les substrats se lient et libèrent séquentiellement, pas simultanément",
fb_ok:"// correct — ping-pong : Asp(donneur) → PLP → α-KG(accepteur). Les deux substrats ne se lient jamais en même temps.",
fb_no:"// ping-pong : substrat 1 → transfert groupe au PLP → substrat 1 part → substrat 2 se lie → transfert → produit 2.",mv:{dx:0,dy:-1}},

questions:[
{c:"Q1 · glycolyse — bilan",type:"qcm",
code:`<span class="cm">// glycolyse — 10 réactions dans le cytoplasme</span>
glucose (6C) → 2 pyruvate (3C)
bilan net : <span class="hl">2 ATP + 2 NADH + 2 pyruvate</span>
<span class="kw">enzymes régulatrices</span> :
  hexokinase · PFK-1 (principale) · pyruvate kinase
<span class="why">// PFK-1 : allostérie — inhibée par ATP (énergie suffisante) et citrate
//         activée par AMP, ADP, fructose-2,6-BP (effet insuline)
// étape irréversible → ne peut pas être inverse directement en gluconéogenèse</span>`,
q:"Lors d'un exercice intense anaérobie (sprint), la glycolyse produit du pyruvate. Le pyruvate est converti en lactate. Pourquoi ?",
ch:["Car le lactate est un meilleur carburant","La conversion pyruvate → lactate régénère le NAD⁺ nécessaire à la poursuite de la glycolyse (GAPDH a besoin de NAD⁺)","Pour refroidir le muscle","Car la mitochondrie est trop lente"],ok:1,
hint:"la glycolyse a besoin de NAD⁺ (oxydé) pour continuer. La LDH régénère le NAD⁺",
fb_ok:"// correct — LDH : pyruvate + NADH → lactate + NAD⁺. Le NAD⁺ régénéré permet à GAPDH de continuer la glycolyse.",
fb_no:"// lactate = régénération du NAD⁺. Sans NAD⁺ → GAPDH bloquée → glycolyse stoppée → pas d'ATP → mort cellulaire.",mv:{dx:1,dy:0}},

{c:"Q2 · cycle de Krebs — bilan",type:"qcm",
code:`<span class="cm">// cycle de Krebs (cycle de l'acide citrique)</span>
lieu : matrice mitochondriale
entrée : acétyl-CoA (2C) + oxaloacétate (4C) → citrate (6C)
par tour : 3 NADH + 1 FADH₂ + 1 GTP + 2 CO₂
2 tours (1 glucose → 2 acétyl-CoA) :
→ <span class="hl">6 NADH + 2 FADH₂ + 2 GTP + 4 CO₂</span>
<span class="why">// le CO₂ expiré provient du cycle de Krebs
// OAA est régénéré → cycle catalytique
// enzymes clé : isocitrate déshydrogénase, α-KG déshydrogénase, succinate déshydrogénase (complexe II)</span>`,
q:"Le CO₂ que nous expirons provient principalement de :",
ch:["La glycolyse","La décarboxylation du pyruvate et le cycle de Krebs (les 4 CO₂ par acétyl-CoA)","La chaîne respiratoire","La fermentation"],ok:1,
hint:"où est produit le CO₂ dans la respiration cellulaire ?",
fb_ok:"// correct — décarboxylation pyruvate (1 CO₂) + Krebs (2 CO₂ par tour × 2 tours) = 4 CO₂ par glucose. La chaîne resp. ne produit pas de CO₂.",
fb_no:"// CO₂ : décarboxylation du pyruvate (1 CO₂) + 2 tours de Krebs (4 CO₂) = 6 CO₂ par glucose.",mv:{dx:0,dy:-1}},

{c:"Q3 · chaîne respiratoire et phosphorylation oxydative",type:"qcm",
code:`<span class="cm">// chaîne respiratoire — complexes I à V</span>
NADH → <span class="hl">complexe I</span> → CoQ → complexe III → cyt c → complexe IV → O₂ → H₂O
FADH₂ → <span class="hl">complexe II</span> → CoQ...
→ pompage de H⁺ vers l'espace intermembranaire (complexes I, III, IV)
→ gradient H⁺ → <span class="hl">complexe V (ATP synthase)</span> → ATP
rendement : NADH = 2.5 ATP · FADH₂ = 1.5 ATP
<span class="why">// ~30 ATP/glucose (moderne) vs 38 ATP (ancienne estimation)
// 2.5 ATP par NADH car le gradient H⁺ est partiellement utilisé pour d'autres transports</span>`,
q:"La metformine inhibe le complexe I de la chaîne respiratoire. Pourquoi cela réduit-il la glycémie ?",
ch:["Car elle bloque l'absorption intestinale du glucose","↓ ATP mitochondrial → ↑ AMP/ATP → activation AMPK → inhibition de la gluconéogenèse hépatique → ↓ production hépatique de glucose","Car elle stimule l'insuline","Car elle augmente la captation musculaire du glucose directement"],ok:1,
hint:"complexe I inhibé → ATP↓ → AMP/ATP↑ → AMPK activée → gluconéogenèse inhibée",
fb_ok:"// correct — metformine → complexe I inhibé → AMP↑ → AMPK → gluconéogenèse hépatique inhibée → ↓ glucose sanguin.",
fb_no:"// metformine → complexe I → ↓ ATP → ↑ AMP/ATP → AMPK activée → ↓ gluconéogenèse hépatique (effet principal).",mv:{dx:1,dy:0}},

{c:"Q4 · fermentation",type:"qcm",
code:`<span class="cm">// fermentation — anaérobie</span>
<span class="kw">lactique</span>  : pyruvate + NADH → lactate + NAD⁺ (muscles, GR)
<span class="kw">alcoolique</span>: pyruvate → acétaldéhyde → éthanol + CO₂ + NAD⁺ (levures)
rôle : régénérer NAD⁺ pour permettre la glycolyse en anaérobie
<span class="why">// les GR (érythrocytes) : pas de mitochondrie → dépendent uniquement de la glycolyse
// l'acidose lactique = accumulation de lactate → ↓ pH → enzyme inhibées
// acidose lactique de la metformine : rare mais grave (surtout si insuffisance rénale)</span>`,
q:"Les globules rouges (érythrocytes) n'ont pas de mitochondries. Comment produisent-ils de l'ATP ?",
ch:["Par la photosynthèse","Uniquement par la glycolyse anaérobie + fermentation lactique pour régénérer le NAD⁺","Par le cycle de Krebs dans le cytoplasme","Ils n'ont pas besoin d'ATP"],ok:1,
hint:"pas de mitochondrie → pas de Krebs ni de chaîne respiratoire",

fb_no:"// GR : pas de mitochondrie → glycolyse + fermentation lactique (pour NAD⁺). 2 ATP/glucose seulement.",mv:{dx:0,dy:-1}},

{c:"Q5 · régulation par insuline et glucagon",type:"qcm",
code:`<span class="cm">// régulation hormonale du métabolisme glucidique</span>
<span class="kw">insuline</span>  (post-prandial) : ↑ glycolyse · ↑ glycogénogenèse · ↓ gluconéogenèse
<span class="kw">glucagon</span>  (jeûne) : ↑ gluconéogenèse · ↑ glycogénolyse · ↓ glycolyse
<span class="why">// mécanisme glucagon :
// glucagon → GPCR → ↑ AMPc → PKA → phosphorylation PFK-2 → ↓ F-2,6-BP → ↓ PFK-1 → ↓ glycolyse
// PKA → phosphorylation GPa → ↑ glycogénolyse
// mécanisme insuline : opposé (↓ AMPc, ↑ PI3K, ↑ Akt)</span>`,
q:"À jeun, le glucagon est sécrété. Il active la glycogénolyse hépatique via la PKA. Cela produit du glucose et l'évite l'hypoglycémie. Comment le glucagon active-t-il la PKA ?",
ch:["Directement en se liant à la PKA","Glucagon → récepteur GPCR → ↑ adénylate cyclase → ↑ AMPc → activation PKA → phosphorylation des cibles","En inhibant l'insuline","En bloquant l'AMP"],ok:1,
hint:"glucagon = GPCR couplé à Gs → adénylate cyclase → AMPc → PKA",
fb_ok:"// correct — glucagon → GPCR(Gs) → adénylate cyclase ↑ → AMPc ↑ → PKA activée → glycogénolyse + gluconéogenèse.",
fb_no:"// glucagon → GPCR → ↑ AMPc → PKA → phosphorylation glycogène phosphorylase (active) → glycogénolyse → glucose.",mv:{dx:1,dy:0}},

{c:"Q6 · corps cétoniques",type:"qcm",
code:`<span class="cm">// corps cétoniques — jeûne prolongé / cétose</span>
jeûne > 24h / régime cétogène / DT1 non traité :

corps cétoniques : β-hydroxybutyrate · acétoacétate · acétone
→ exportés vers cerveau, cœur, muscle comme carburant alternatif
<span class="why">// en cétose physiologique (jeûne) : glucose épargné pour le cerveau

fb_no:"// corps cétoniques = acides faibles → pKa~4 → à pH sanguin (7.4) totalement déprotonés → libèrent H⁺ → acidose.",mv:{dx:0,dy:-1}},

{c:"Q7 · β-oxydation des acides gras",type:"qcm",
code:`<span class="cm">// β-oxydation — dégradation des acides gras</span>
lieu : matrice mitochondriale
par cycle (enlève 2C) : 1 FADH₂ + 1 NADH + 1 acétyl-CoA
acide palmitique (C16) : 7 cycles → 8 acétyl-CoA + 7 FADH₂ + 7 NADH
rendement total : <span class="hl">~108 ATP par palmitate</span> (vs ~30 ATP/glucose)
<span class="why">// les acides gras sont 2× plus énergétiques/gramme que les glucides
// réserves graisseuses = stockage énergétique optimal (anhydres, denses)

hint:"glycogène = polaire = retient l'eau. Les lipides = apolaires = anhydres = plus denses.",
fb_ok:"// correct — lipides 9 kcal/g (anhydres). Glycogène ~4 kcal/g sec mais retient l'eau → ~1 kcal/g de tissu. Lipides: 9× plus efficaces.",
fb_no:"// lipides : apolaires → pas d'eau. Glycogène : polaire → retient ~3× son poids en eau → densité énergétique faible.",mv:{dx:1,dy:0}},

{c:"Q8 · gluconéogenèse",type:"qcm",
code:`<span class="cm">// gluconéogenèse — synthèse de glucose</span>

pas l'inverse de la glycolyse : 3 réactions différentes
enzyme clé : <span class="hl">PEPCK</span> (OAA → PEP) · fructose-1,6-bisphosphatase · glucose-6-phosphatase
<span class="why">// régulée par glucagon (↑) et insuline (↓)
// cortisol stimule la gluconéogenèse (stress → ↑ glycémie)
// cycle de Cori : lactate musculaire → foie → glucose → muscle</span>`,

ch:["Neutre — cycle fermé","Le foie utilise 6 ATP pour reconvertir 2 lactate en glucose, alors que les muscles n'ont produit que 2 ATP par glucose → bilan net négatif (énergie fournie par le foie)","Le foie produit de l'ATP supplémentaire","Le cycle est gratuit"],ok:1,
hint:"convertir lactate en glucose coûte de l'énergie (gluconéogenèse = énergivore)",
fb_ok:"// correct — gluconéogenèse hépatique : coûte 6 ATP par glucose. Muscles : ont produit 2 ATP. Bilan = −4 ATP. Coût énergétique au foie.",
fb_no:"// cycle de Cori : musclesproduit 2 ATP + lactate. Foie consomme 6 ATP pour remettre glucose. Bilan : −4 ATP. Foie paie la dette.",mv:{dx:0,dy:-1}},

{c:"Q9 · synthèse des acides gras",type:"qcm",
code:`<span class="cm">// lipogenèse de novo — synthèse des AG</span>
lieu : cytoplasme (FAS = fatty acid synthase)
unité de base : acétyl-CoA (2C) + malonyl-CoA (3C)
cofacteur : <span class="hl">NADPH</span> (pas NADH !)
palmitate C16 : 8 acétyl-CoA + 14 NADPH + 7 ATP
<span class="why">// NADPH fourni par : voie des pentoses phosphates · malate enzyme
// lipogenèse activée par l'insuline (après repas)

{c:"Q15 · complexe — pharmacologie métabolique",type:"qcm",
code:`<span class="cm">// médicaments ciblant le métabolisme</span>
<span class="kw">metformine</span>   : complexe I → AMPK → ↓ gluconéogenèse
<span class="kw">statines</span>     : HMG-CoA réductase → ↓ cholestérol
<span class="kw">fibrates</span>     : PPARα → ↑ β-oxydation → ↓ triglycérides
<span class="kw">gliflozines</span>  : SGLT2 inhibiteur → ↑ glucosurie → ↓ glycémie
<span class="kw">GLP-1 RA</span>    : semaglutide → ↑ insuline, ↓ glucagon, ↓ appétit, ↓ vidange gastrique
<span class="why">// semaglutide (Ozempic/Wegovy) : agoniste GLP-1 → résultats remarquables
// perte de poids ~15% · ↓ événements cardiovasculaires · essais en obésité</span>`,
q:"Les gliflozines (SGLT2 inhibiteurs, ex: empagliflozine) réduisent la glycémie en augmentant l'élimination rénale du glucose. Quel effet inattendu a montré des bénéfices cardiovasculaires et rénaux majeurs ?",
ch:["Réduction de la pression artérielle uniquement","Réduction de la glycémie + réduction de la pression de perfusion rénale (vasoconstriction afférente) + effet cardioprotecteur (réduction de précharge) → bénéfices au-delà du simple contrôle glycémique","Stimulation de l'insuline","Réduction du cholestérol"],ok:1,
hint:"les gliflozines ont des effets cardiovasculaires et rénaux indépendants du contrôle glycémique",
fb_ok:"// correct — SGLT2i : au-delà de la glycémie → ↓ pression intraglomérulaire → protection rénale + ↓ surcharge volumique → protection cardiaque.",
fb_no:"// SGLT2i : effets pléiotropes. ↓ glycosurie + ↓ natriurie légère → ↓ précardiale + ↓ pression intraglomérulaire → cardioprotection + néphroprotection.",mv:{dx:1,dy:0}},
]},

];

// ══════════════════════════════════════
//  MOTEUR DE JEU
// ══════════════════════════════════════
const SECTIONS={};
CHAPTERS.forEach(ch=>{if(!SECTIONS[ch.sec])SECTIONS[ch.sec]=[];SECTIONS[ch.sec].push(ch);});
let curChap=null,curQ=0,score=0,answered=false,rX=0,rY=5;
const GOAL={x:5,y:0};let traces=new Set();

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goHome(){document.getElementById('win').classList.remove('show');show('s-home');}

function buildHome(){
  const list=document.getElementById('chap-list');list.innerHTML='';
  Object.entries(SECTIONS).forEach(([sec,chaps])=>{
    const sd=document.createElement('div');sd.className='chap-section';
    const lbl=document.createElement('div');lbl.className='chap-section-lbl';lbl.textContent=sec;sd.appendChild(lbl);
    chaps.forEach(ch=>{
      const row=document.createElement('div');row.className='chap-row';
      row.innerHTML=`<span class="chap-num">${ch.num}.</span><span class="chap-name">${ch.name}</span><span class="chap-level">${ch.level}</span><span class="chap-count">${ch.questions.length} qs</span>`;
      row.onclick=()=>startChap(ch);sd.appendChild(row);});
    list.appendChild(sd);});}

function startChap(ch){curChap=ch;curQ=0;score=0;answered=false;rX=0;rY=5;traces=new Set();document.getElementById('win').classList.remove('show');buildGrid();loadQ();show('s-game');}

function loadQ(){
  answered=false;const q=curChap.questions[curQ];
  document.getElementById('g-title').textContent=curChap.name;
  document.getElementById('g-pts').textContent=score+' pts';
  document.getElementById('g-ctag').textContent=q.c;
  document.getElementById('g-concept').innerHTML=q.code;
  document.getElementById('g-q').textContent=q.q;
  document.getElementById('g-fb').className='fb';
  document.getElementById('g-next').className='btnext';
  const badge=document.getElementById('g-qbadge');
  badge.textContent=q.type==='qcm'?'QCM':'question ouverte';
  badge.className='qbadge '+(q.type==='qcm'?'qcm':'open');
  const dr=document.getElementById('dots-row');dr.innerHTML='';
  curChap.questions.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i<curQ?' done':i===curQ?' cur':'');dr.appendChild(d);});
  const cc=document.getElementById('g-choices'),ow=document.getElementById('g-open'),inp=document.getElementById('g-input');
  cc.innerHTML='';
  if(q.type==='qcm'){ow.style.display='none';q.ch.forEach((t,i)=>{const b=document.createElement('button');b.className='choice';b.textContent=t;b.onclick=()=>answerQcm(i);cc.appendChild(b);});}
  else{ow.style.display='flex';inp.value='';inp.disabled=false;document.querySelector('.open-btn').disabled=false;setTimeout(()=>inp.focus(),100);}
}

function answerQcm(idx){
  if(answered)return;answered=true;const q=curChap.questions[curQ];const ok=idx===q.ok;
  document.querySelectorAll('.choice').forEach((b,i)=>{if(i===q.ok)b.classList.add('ok');else if(i===idx&&!ok)b.classList.add('no');else b.classList.add('dim');b.onclick=null;});showFb(ok,q);}

function checkOpen(){
  if(answered)return;const q=curChap.questions[curQ];const val=document.getElementById('g-input').value.trim().toLowerCase();if(!val)return;
  const ok=q.keys.some(k=>val.includes(k.toLowerCase())||k.toLowerCase()===val);answered=true;
  document.getElementById('g-input').disabled=true;document.querySelector('.open-btn').disabled=true;showFb(ok,q);}

function showFb(ok,q){
  const fb=document.getElementById('g-fb');fb.className='fb show '+(ok?'ok':'no');fb.textContent=ok?q.fb_ok:q.fb_no;
  if(ok){score+=10;document.getElementById('g-pts').textContent=score+' pts';sparks();}
  moveRobot(q.mv.dx,q.mv.dy);document.getElementById('g-next').className='btnext show';}

function doHint(){const fb=document.getElementById('g-fb');fb.className='fb show hint';fb.textContent='? '+curChap.questions[curQ].hint;}
function nextQ(){curQ++;if(curQ>=curChap.questions.length){showWin();return;}loadQ();}

function showWin(){
  document.getElementById('win-title').textContent=`// ${curChap.name} · maîtrisé`;
  const ul=document.getElementById('win-list');ul.innerHTML='';
  curChap.takeaway.forEach(t=>{const li=document.createElement('li');li.textContent=t;ul.appendChild(li);});
  document.getElementById('win').classList.add('show');}

function restartChap(){document.getElementById('win').classList.remove('show');startChap(curChap);}

function buildGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let y=0;y<6;y++)for(let x=0;x<6;x++){const d=document.createElement('div');d.id=`gc${x}${y}`;d.className='gcell';if(x===GOAL.x&&y===GOAL.y)d.textContent='🏁';g.appendChild(d);}renderGrid();}

function renderGrid(){
  for(let y=0;y<6;y++)for(let x=0;x<6;x++){
    const d=document.getElementById(`gc${x}${y}`);if(!d)continue;
    d.className='gcell';d.textContent='';d.innerHTML='';
    if(x===GOAL.x&&y===GOAL.y){d.classList.add('goal');d.textContent='🏁';continue;}
    if(traces.has(`${x},${y}`))d.classList.add('trace');
    if(x===rX&&y===rY){d.classList.add('robot');d.innerHTML=`<svg width="26" height="26" viewBox="0 0 32 32" fill="none"><rect x="8" y="12" width="16" height="14" rx="4" fill="#1a1814"/><rect x="11" y="15" width="4" height="4" rx="1.5" fill="#faf8f4"/><rect x="17" y="15" width="4" height="4" rx="1.5" fill="#faf8f4"/><rect x="13" y="21" width="6" height="2" rx="1" fill="#7a9e87"/><rect x="14" y="8" width="4" height="5" rx="2" fill="#1a1814"/><circle cx="16" cy="7" r="2" fill="#c8a870"/><rect x="5" y="16" width="3" height="6" rx="1.5" fill="#1a1814"/><rect x="24" y="16" width="3" height="6" rx="1.5" fill="#1a1814"/><rect x="10" y="26" width="4" height="3" rx="1.5" fill="#1a1814"/><rect x="18" y="26" width="4" height="3" rx="1.5" fill="#1a1814"/></svg>`;}}}

function moveRobot(dx,dy){
  traces.add(`${rX},${rY}`);rX=Math.max(0,Math.min(5,rX+dx));rY=Math.max(0,Math.min(5,rY+dy));renderGrid();
  const dir=dx>0?'droite':dx<0?'gauche':dy<0?'haut':'bas';
  document.getElementById('g-mlog').textContent=`${curQ+1}/${curChap.questions.length} → ${dir}`;}

function sparks(){
  const cell=document.getElementById(`gc${rX}${rY}`);if(!cell)return;
  const r=cell.getBoundingClientRect();
  ['#c8a870','#e8a598','#7a9e87','#a89ec8'].forEach((c,i)=>{
    const p=document.createElement('div');p.className='pt';const s=3+Math.random()*5;
    p.style.cssText=`width:${s}px;height:${s}px;background:${c};left:${r.left+r.width/2+(-15+Math.random()*30)}px;top:${r.top+r.height/2}px;animation-delay:${i*0.05}s`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),1000);});}

buildHome();
</script>
</body>
</html>
