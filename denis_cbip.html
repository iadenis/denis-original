<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denis · médecine CBIP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#faf8f4; --bg2:#f0ebe2; --bg3:#e8dfd0;
  --ink:#1a1814; --ink2:#6b6760; --ink3:#b5b2ac;
  --sage:#7a9e87; --blush:#e8a598; --sky:#8fb4c8;
  --amber:#c8a870; --line:rgba(26,24,20,0.08);
}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:12px;padding:0.75rem 1.5rem;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:0;z-index:50;}
.tlogo{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--ink);}
.tsep{color:var(--ink3);font-size:12px;}
.tmod{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink2);}
.spacer{flex:1;}
.pts{font-family:'DM Mono',monospace;font-size:11px;color:var(--sage);background:rgba(122,158,135,0.1);padding:3px 10px;border-radius:999px;border:1px solid rgba(122,158,135,0.2);}

/* ── HOME ── */
#s-home{align-items:center;justify-content:center;padding:2rem 1.5rem;gap:0;}
.home-logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.1em;color:var(--ink3);margin-bottom:4px;}
.home-title{font-family:'DM Mono',monospace;font-size:42px;font-weight:300;color:var(--ink);margin-bottom:4px;}
.home-sub{font-size:13px;color:var(--ink2);margin-bottom:2.5rem;font-weight:300;}
.cbip-banner{background:var(--ink);color:var(--bg);border-radius:14px;padding:1.25rem 1.75rem;max-width:500px;width:100%;margin-bottom:1.5rem;}
.cbip-banner-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.12em;opacity:0.45;margin-bottom:5px;text-transform:uppercase;}
.cbip-banner-title{font-family:'DM Mono',monospace;font-size:16px;margin-bottom:3px;}
.cbip-banner-sub{font-size:12px;opacity:0.55;font-weight:300;}
.chapters-list{max-width:500px;width:100%;display:flex;flex-direction:column;gap:0;}
.chap-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer;transition:opacity 0.12s;}
.chap-row:last-child{border-bottom:none;}
.chap-row:hover{opacity:0.55;}
.chap-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);min-width:22px;}
.chap-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);flex:1;}
.chap-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);}
.chap-arrow{font-size:11px;color:var(--ink3);}

/* ── GAME ── */
#s-game{flex-direction:column;}
.dots-row{display:flex;gap:3px;padding:0.45rem 1.5rem;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--bg3);border:1px solid var(--line);transition:all 0.3s;}
.dot.done{background:var(--sage);border-color:var(--sage);}
.dot.cur{background:var(--ink);border-color:var(--ink);transform:scale(1.3);}
.gbody{flex:1;display:grid;grid-template-columns:1fr 280px;}
@media(max-width:640px){.gbody{grid-template-columns:1fr;}.gright{border-left:none;border-top:1px solid var(--line);}}
.gleft{padding:1.5rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;border-right:1px solid var(--line);}
.gright{padding:1.1rem;display:flex;flex-direction:column;align-items:center;gap:0.9rem;background:var(--bg2);}

/* concept */
.ctag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;color:var(--ink3);text-transform:uppercase;}
.ccard{background:white;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.ccard-top{display:flex;align-items:center;gap:5px;padding:6px 11px;border-bottom:1px solid var(--line);background:var(--bg2);}
.cdot{width:7px;height:7px;border-radius:50%;}
.cbody{padding:0.85rem 1.1rem;font-family:'DM Mono',monospace;font-size:12px;line-height:1.95;color:var(--ink2);white-space:pre-wrap;}
.cbody .hl{color:var(--ink);font-weight:500;}
.cbody .cm{color:var(--ink3);font-style:italic;}
.cbody .kw{color:var(--sage);}
.cbody .ex{display:block;background:var(--bg2);border:1px solid var(--line);border-radius:5px;padding:6px 10px;margin:4px 0;font-size:11.5px;line-height:1.7;color:var(--ink);font-style:normal;}
.cbody .warn{display:block;background:rgba(232,165,152,0.1);border:1px solid rgba(232,165,152,0.3);border-radius:5px;padding:6px 10px;margin:4px 0;font-size:11.5px;color:#8b4a3e;}
.cbody .ok{display:block;background:rgba(122,158,135,0.1);border:1px solid rgba(122,158,135,0.3);border-radius:5px;padding:6px 10px;margin:4px 0;font-size:11.5px;color:#3d6b4f;}

/* question */
.qtext{font-size:14.5px;font-weight:400;color:var(--ink);line-height:1.6;}
.choices{display:flex;flex-direction:column;gap:5px;}
.choice{padding:9px 13px;border-radius:8px;border:1px solid var(--line);background:white;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;text-align:left;transition:all 0.11s;line-height:1.5;}
.choice:hover:not(:disabled){border-color:var(--ink3);background:var(--bg2);}
.choice.ok{background:rgba(122,158,135,0.1);border-color:var(--sage);color:#3d6b4f;}
.choice.no{background:rgba(232,165,152,0.1);border-color:var(--blush);color:#8b4a3e;}
.choice.dim{opacity:0.3;cursor:default;}
.fb{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--ink2);line-height:1.7;padding:8px 12px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);display:none;}
.fb.show{display:block;}
.fb.ok{border-color:rgba(122,158,135,0.35);color:#3d6b4f;background:rgba(122,158,135,0.07);}
.fb.no{border-color:rgba(232,165,152,0.35);color:#8b4a3e;background:rgba(232,165,152,0.07);}
.fb.hint{border-color:rgba(200,168,112,0.35);color:#7a5e1e;background:rgba(200,168,112,0.07);}
.gactions{display:flex;gap:7px;align-items:center;}
.btnext{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.06em;padding:7px 16px;border-radius:999px;background:var(--ink);color:var(--bg);border:none;cursor:pointer;display:none;transition:opacity 0.12s;}
.btnext:hover{opacity:0.75;}
.btnext.show{display:block;}
.btnhint{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);border:1px solid var(--line);background:none;border-radius:999px;padding:7px 12px;cursor:pointer;transition:all 0.11s;}
.btnhint:hover{color:var(--ink2);border-color:var(--ink3);}
.btnback{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);border:none;background:none;cursor:pointer;padding:0;letter-spacing:0.04em;}
.btnback:hover{color:var(--ink);}

/* grid */
.glbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;color:var(--ink3);text-transform:uppercase;align-self:flex-start;}
.grid-outer{background:white;border:1px solid var(--line);border-radius:11px;padding:6px;}
.grid{display:grid;grid-template-columns:repeat(6,36px);grid-template-rows:repeat(6,36px);gap:2px;}
.gcell{width:36px;height:36px;border-radius:5px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.2s;}
.gcell.trace{background:rgba(122,158,135,0.1);}
.gcell.trace::after{content:'·';color:var(--sage);font-size:15px;}
.gcell.goal{background:rgba(122,158,135,0.12);}
.gcell.robot{background:transparent;}
.mlog{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);align-self:flex-start;min-height:14px;}

/* win */
.win{display:none;position:fixed;inset:0;background:rgba(250,248,244,0.96);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:1.1rem;padding:2rem;text-align:center;}
.win.show{display:flex;}
.win-robot{font-size:36px;animation:bob 2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.win-title{font-family:'DM Mono',monospace;font-size:14px;color:var(--ink);letter-spacing:0.04em;}
.win-msgs{background:white;border:1px solid var(--line);border-radius:11px;padding:1rem 1.3rem;text-align:left;max-width:420px;width:100%;}
.win-msgs-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:9px;}
.win-msgs ul{list-style:none;display:flex;flex-direction:column;gap:6px;}
.win-msgs li{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--ink2);line-height:1.6;padding-left:13px;position:relative;}
.win-msgs li::before{content:'→';position:absolute;left:0;color:var(--sage);}
.win-btns{display:flex;gap:7px;}
.btn-restart{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.06em;padding:8px 18px;border-radius:999px;background:var(--ink);color:var(--bg);border:none;cursor:pointer;}
.btn-restart:hover{opacity:0.75;}
.btn-menu{font-family:'DM Mono',monospace;font-size:11px;padding:8px 18px;border-radius:999px;background:none;color:var(--ink2);border:1px solid var(--line);cursor:pointer;letter-spacing:0.04em;}
.btn-menu:hover{border-color:var(--ink3);color:var(--ink);}
.pt{position:fixed;pointer-events:none;border-radius:50%;animation:fup 1s ease-out forwards;z-index:999;}
@keyframes fup{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-55px) scale(0);opacity:0}}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="s-home">
  <div class="home-logo">denis · médecine</div>
  <div class="home-title">cbip</div>
  <div class="home-sub">répertoire commenté des médicaments · progressif · basé sur les preuves</div>
  <div class="cbip-banner">
    <div class="cbip-banner-tag">source · cbip.be</div>
    <div class="cbip-banner-title">répertoire commenté 2026</div>
    <div class="cbip-banner-sub">20 chapitres · information indépendante · EBM</div>
  </div>
  <div class="chapters-list" id="chapters-list"></div>
</div>

<!-- GAME -->
<div class="screen" id="s-game">
  <div class="topbar">
    <button class="btnback" onclick="goHome()">← cbip</button>
    <span class="tsep">/</span>
    <span class="tmod" id="g-title"></span>
    <div class="spacer"></div>
    <span class="pts" id="g-pts">0 pts</span>
  </div>
  <div class="dots-row" id="dots-row"></div>
  <div class="gbody">
    <div class="gleft">
      <div class="ctag" id="g-ctag"></div>
      <div class="ccard">
        <div class="ccard-top">
          <div class="cdot" style="background:#e8a598"></div>
          <div class="cdot" style="background:#e8d498"></div>
          <div class="cdot" style="background:#a8c8a0"></div>
        </div>
        <div class="cbody" id="g-concept"></div>
      </div>
      <div class="qtext" id="g-q"></div>
      <div class="choices" id="g-choices"></div>
      <div class="fb" id="g-fb"></div>
      <div class="gactions">
        <button class="btnhint" onclick="doHint()">? indice</button>
        <button class="btnext" id="g-next" onclick="nextQ()">suivant →</button>
      </div>
    </div>
    <div class="gright">
      <div class="glbl">progression</div>
      <div class="grid-outer"><div class="grid" id="grid"></div></div>
      <div class="mlog" id="g-mlog">en attente...</div>
    </div>
  </div>
</div>

<!-- WIN -->
<div class="win" id="win">
  <div class="win-robot">🤖</div>
  <div class="win-title" id="win-title"></div>
  <div class="win-msgs">
    <div class="win-msgs-lbl">take_home_messages[]</div>
    <ul id="win-list"></ul>
  </div>
  <div class="win-btns">
    <button class="btn-restart" onclick="restartChap()">↺ recommencer</button>
    <button class="btn-menu" onclick="goHome()">chapitres</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  DONNÉES CBIP — 20 chapitres
// ══════════════════════════════════════════════════════
const CHAPTERS = [

  // ── 1. CARDIO-VASCULAIRE ──────────────────────────
  { id:"cv", num:"1", name:"système cardio-vasculaire",
    takeaway:[
      "HTA : objectif < 140/90 mmHg (< 130/80 si diabète/MRC)",
      "IEC + sartan = déconseillé — double blocage SRAA",
      "statines : réduisent le LDL, preuve solide en prévention secondaire",
      "bêtabloquants : bradycardie et hypotension possibles",
      "surveiller kaliémie sous IEC/sartan/spironolactone"
    ],
    questions:[
      { c:"1.1 · HTA — objectifs",
        code:`<span class="cm">// hypertension artérielle — objectifs tensionnels</span>
<span class="kw">général</span>      : &lt; <span class="hl">140/90</span> mmHg
<span class="kw">diabète / MRC</span> : &lt; <span class="hl">130/80</span> mmHg
<span class="kw">1ère ligne</span>   : IEC · sartan · thiazide · bêtabloquant · ICC
<span class="cm">// choix selon profil patient (âge, comorbidités)</span>`,
        q:"Patient 60 ans, HTA isolée, TA = 155/95. Objectif tensionnel ?",
        ch:["< 160/100 mmHg","< 140/90 mmHg","< 120/70 mmHg"],
        ok:1, hint:"objectif général sans comorbidité selon CBIP",
        fb_ok:"// correct — objectif général HTA : < 140/90 mmHg",
        fb_no:"// objectif standard HTA sans comorbidité : < 140/90 mmHg",
        mv:{dx:1,dy:0} },
      { c:"1.2 · HTA — interactions",
        code:`<span class="cm">// association IEC + sartan — DÉCONSEILLÉE</span>
<span class="kw">IEC</span>    = ramipril, énalapril, lisinopril...
<span class="kw">sartan</span> = valsartan, losartan, candésartan...
<span class="warn">⚠ double blocage SRAA
  → insuffisance rénale aiguë
  → hyperkaliémie</span>
<span class="cm">// exceptions très rares — avis spécialisé requis</span>`,
        q:"Pourquoi ne jamais associer un IEC et un sartan ?",
        ch:["ils ont le même mécanisme et s'annulent","double blocage SRAA → IRA + hyperkaliémie","interaction hépatique grave"],
        ok:1, hint:"double blocage du système rénine-angiotensine-aldostérone",
        fb_ok:"// correct — double blocage SRAA → risque rénal et hyperkaliémie",
        fb_no:"// IEC + sartan = double blocage SRAA → IRA potentielle + hyperkaliémie",
        mv:{dx:0,dy:-1} },
      { c:"1.3 · statines",
        code:`<span class="cm">// statines — inhibiteurs HMG-CoA réductase</span>
<span class="kw">effet</span>    = ↓ LDL cholestérol
<span class="kw">preuve</span>   = <span class="hl">solide</span> en prévention secondaire cardiovasculaire
<span class="kw">EI</span>       = myalgies (fréquents) · rhabdomyolyse (rare)
<span class="cm">// si myalgies → doser CPK avant de décider</span>`,
        q:"Patient sous statine avec myalgies. Première étape ?",
        ch:["arrêter immédiatement","doser les CPK sanguins","doubler la dose pour tester"],
        ok:1, hint:"les myalgies nécessitent un bilan biologique avant décision",
        fb_ok:"// correct — doser les CPK pour évaluer le risque de rhabdomyolyse",
        fb_no:"// myalgies sous statine → doser CPK d'abord, décider ensuite",
        mv:{dx:1,dy:0} },
      { c:"1.4 · bêtabloquants",
        code:`<span class="cm">// bêtabloquants — indications clés</span>
<span class="kw">indications</span> = HTA · angor · insuffisance cardiaque · arythmies
<span class="kw">CI relatives</span> = asthme · BAV · bradycardie sévère
<span class="kw">EI</span>          = bradycardie · hypotension · fatigue · bronchospasme
<span class="cm">// ne jamais arrêter brusquement → rebond</span>`,
        q:"Patient asthmatique sous bêtabloquant pour HTA. Quel risque principal ?",
        ch:["tachycardie paradoxale","bronchospasme — CI relative chez l'asthmatique","augmentation de la TA"],
        ok:1, hint:"les bêtabloquants bloquent les récepteurs bêta-2 bronchiques",
        fb_ok:"// correct — bêtabloquants : CI relative dans l'asthme → bronchospasme",
        fb_no:"// bêtabloquants bloquent les β2 bronchiques → bronchospasme chez l'asthmatique",
        mv:{dx:0,dy:-1} },
      { c:"1.5 · antiagrégants",
        code:`<span class="cm">// aspirine faible dose (75-100 mg)</span>
<span class="kw">indication</span>  = prévention <span class="hl">secondaire</span> cardiovasculaire
<span class="warn">⚠ prévention PRIMAIRE : bénéfice &lt; risque hémorragique
  → non recommandée en général</span>
<span class="kw">clopidogrel</span> = alternative si allergie aspirine
<span class="cm">// méta-analyse Lancet 2025 : clopidogrel ≥ aspirine en prév. secondaire</span>`,
        q:"Homme 55 ans, sans ATCD cardiovasculaire, HTA bien contrôlée. Aspirine préventive ?",
        ch:["oui — prévention primaire recommandée","non — en prévention primaire, le risque hémorragique > bénéfice","oui — à partir de 50 ans toujours"],
        ok:1, hint:"prévention primaire vs secondaire — distinction fondamentale",
        fb_ok:"// correct — prévention primaire : risque hémorragique > bénéfice attendu",
        fb_no:"// aspirine faible dose = prévention SECONDAIRE. En primaire : non recommandée.",
        mv:{dx:1,dy:0} },
    ]
  },

  // ── 2. SANG ET COAGULATION ────────────────────────
  { id:"sang", num:"2", name:"sang et coagulation",
    takeaway:[
      "AVK (warfarine) : INR cible 2-3 (2.5-3.5 si valve mécanique)",
      "AOD (apixaban, rivaroxaban...) : pas de monitoring INR",
      "héparines : différencier HNF (IV/SC) et HBPM (SC)",
      "antidote AOD : andexanet alfa (anti-Xa) / idarucizumab (dabigatran)",
      "interaction AVK : nombreux médicaments et aliments (vitamine K)"
    ],
    questions:[
      { c:"2.1 · anticoagulants — généralités",
        code:`<span class="cm">// anticoagulants oraux</span>
<span class="kw">AVK</span>    = warfarine, acénocoumarol
       → monitoring <span class="hl">INR</span> obligatoire
       → INR cible : <span class="hl">2-3</span> (FA, MTEV)
<span class="kw">AOD</span>    = apixaban, rivaroxaban, dabigatran
       → <span class="hl">pas de monitoring INR</span> en routine
<span class="cm">// AOD : doses fixes selon indication et fonction rénale</span>`,
        q:"Patient sous warfarine. Comment surveiller l'anticoagulation ?",
        ch:["temps de saignement","INR (INR cible 2-3)","numération plaquettaire"],
        ok:1, hint:"les AVK nécessitent un monitoring spécifique",
        fb_ok:"// correct — AVK → monitoring INR obligatoire, cible 2-3",
        fb_no:"// AVK = warfarine/acénocoumarol → monitoring INR, cible 2-3",
        mv:{dx:1,dy:0} },
      { c:"2.2 · AOD vs AVK",
        code:`<span class="cm">// avantages et limites des AOD</span>
<span class="ok">✓ pas de monitoring INR
✓ moins d'interactions alimentaires
✓ efficacité similaire aux AVK</span>
<span class="warn">⚠ coût plus élevé
⚠ adaptation dose si insuffisance rénale
⚠ antidotes disponibles mais coûteux</span>`,
        q:"Avantage principal des AOD sur les AVK ?",
        ch:["plus efficaces que les AVK","pas de monitoring INR en routine","moins d'effets indésirables"],
        ok:1, hint:"la simplification du suivi est le principal avantage pratique",
        fb_ok:"// correct — AOD : pas de monitoring INR = grande simplification",
        fb_no:"// principal avantage AOD : pas de monitoring INR en routine",
        mv:{dx:0,dy:-1} },
      { c:"2.3 · antidotes",
        code:`<span class="cm">// antidotes anticoagulants</span>
<span class="kw">AVK</span>        → vitamine K (lent) · PPSB (rapide)
<span class="kw">HNF</span>        → protamine sulfate
<span class="kw">dabigatran</span> → <span class="hl">idarucizumab</span> (Praxbind®)
<span class="kw">anti-Xa AOD</span>→ <span class="hl">andexanet alfa</span> (Ondexxya®)
<span class="cm">// urgence hémorragique = contacter urgences</span>`,
        q:"Patient sous dabigatran avec hémorragie grave. Quel antidote ?",
        ch:["vitamine K","idarucizumab (Praxbind®)","andexanet alfa"],
        ok:1, hint:"l'antidote spécifique du dabigatran est l'idarucizumab",
        fb_ok:"// correct — dabigatran → idarucizumab (Praxbind®)",
        fb_no:"// dabigatran = inhibiteur direct de la thrombine → antidote = idarucizumab",
        mv:{dx:1,dy:0} },
    ]
  },

  // ── 3. GASTRO-INTESTINAL ─────────────────────────
  { id:"gi", num:"3", name:"système gastro-intestinal",
    takeaway:[
      "IPP : traitement court privilégié — risque de dépendance à long terme",
      "H. pylori : traitement triple (IPP + 2 antibiotiques) 7-14 jours",
      "laxatifs osmotiques : macrogol = 1ère ligne constipation chronique",
      "AINS + IPP : association recommandée chez patients à risque gastrique",
      "antiémétiques : métoclopramide — risque EPS, éviter > 5 jours"
    ],
    questions:[
      { c:"3.1 · IPP — usage raisonné",
        code:`<span class="cm">// inhibiteurs de la pompe à protons</span>
<span class="kw">indications</span> = RGO · ulcère · protection gastroprotection AINS

<span class="warn">⚠ si DFG &lt; 60 ml/min :
  → suspendre metformine 48h avant l'examen
  → reprendre 48h après si fonction rénale stable
  → risque d'acidose lactique si IRA post-contraste</span>
<span class="kw">si DFG &gt; 60</span> = pas de suspension systématique nécessaire
<span class="cm">// toujours hydratation IV préventive si risque</span>`,
        q:"Patient sous metformine, DFG = 45 ml/min, scanner avec contraste demain. Que faire ?",
        ch:["rien — la metformine est toujours sûre","suspendre la metformine 48h avant et après le scanner","doubler la dose d'hydratation uniquement"],
        ok:1, hint:"DFG < 60 + contraste iodé = suspendre metformine pour prévenir l'acidose lactique",
        fb_ok:"// correct — DFG < 60 + contraste → suspendre metformine 48h avant et après",
        fb_no:"// metformine + contraste iodé + DFG < 60 = risque acidose lactique → suspendre 48h av/ap",
        mv:{dx:0,dy:-1} },
    ]
  },

  // ── 20. MÉDICAMENTS DIVERS ───────────────────────
  { id:"div", num:"20", name:"médicaments divers",
    takeaway:[
      "automédication : toujours vérifier les interactions et les CI",
      "médicaments OTC ≠ médicaments sans risque — paracétamol, ibuprofène, antihistaminiques",
      "phytothérapie : millepertuis = inducteur enzymatique puissant (interactions majeures)",
      "compléments alimentaires : pas d'autorisation d'efficacité — risques sous-estimés",
      "médicaments périmés : ne jamais utiliser — efficacité et sécurité non garanties"
    ],
    questions:[
      { c:"20.1 · millepertuis — interactions",
        code:`<span class="cm">// millepertuis (Hypericum perforatum)</span>
<span class="kw">usage</span>      = dépression légère à modérée (phytothérapie)
<span class="warn">⚠ inducteur enzymatique puissant (CYP3A4, P-gp)
  → ↓ efficacité de nombreux médicaments :
  · contraceptifs oraux (grossesse possible !)
  · antiviraux (VIH, hépatite C)
  · ciclosporine, tacrolimus
  · warfarine
  · digoxine</span>`,
        q:"Patiente sous contraceptif oral commence le millepertuis. Quel risque ?",
        ch:["aucun — c'est une plante naturelle","diminution de l'efficacité du contraceptif → risque de grossesse","augmentation de l'effet contraceptif"],
        ok:1, hint:"le millepertuis est un inducteur enzymatique puissant qui accélère le métabolisme des médicaments",
        fb_ok:"// correct — millepertuis + contraceptif oral → ↓ efficacité → risque de grossesse",
        fb_no:"// millepertuis = inducteur CYP3A4 → métabolisme accéléré contraceptif → ↓ efficacité",
        mv:{dx:1,dy:0} },
      { c:"20.2 · automédication — vigilance",
        code:`<span class="cm">// médicaments OTC — pas sans risque</span>
<span class="kw">ibuprofène OTC</span> = AINS → risques gastrique, rénal, CV
<span class="kw">antihistaminiques</span> = sédation · rétention urinaire (sujet âgé)
<span class="kw">décongestionnants</span>= risque rebond · CI HTA
<span class="cm">// "en vente libre" ≠ "inoffensif"
// toujours vérifier CI et interactions</span>`,
        q:"Homme 70 ans, insuffisance rénale modérée, prend de l'ibuprofène en automédication. Risque ?",
        ch:["aucun — l'ibuprofène est en vente libre","aggravation de l'insuffisance rénale — AINS CI si DFG < 30","seulement si pris à forte dose"],
        ok:1, hint:"les AINS sont contre-indiqués ou à utiliser avec grande prudence en cas d'insuffisance rénale",
        fb_ok:"// correct — AINS + insuffisance rénale = risque d'aggravation majeur",
        fb_no:"// AINS = vasoconstricteurs rénaux → aggravation IR. CI si DFG < 30. Vigilance si < 60.",

];

// ══════════════════════════════════════════════════════
//  ÉTAT
// ══════════════════════════════════════════════════════
let curChap = null, curQ = 0, score = 0, answered = false;
let rX = 0, rY = 5;
const GOAL = {x:5,y:0};
let traces = new Set();

// ══════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome() {
  document.getElementById('win').classList.remove('show');
  show('s-home');
}

// ══════════════════════════════════════════════════════
//  BUILD HOME
// ══════════════════════════════════════════════════════
function buildHome() {
  const list = document.getElementById('chapters-list');
  list.innerHTML = '';
  CHAPTERS.forEach(ch => {
    const row = document.createElement('div');
    row.className = 'chap-row';
    row.innerHTML = `
      <span class="chap-num">${ch.num}.</span>
      <span class="chap-name">${ch.name}</span>
      <span class="chap-count">${ch.questions.length} niveaux</span>
      <span class="chap-arrow">›</span>`;
    row.onclick = () => startChap(ch.id);
    list.appendChild(row);
  });
}

// ══════════════════════════════════════════════════════
//  JEU
// ══════════════════════════════════════════════════════
function startChap(id) {
  curChap = CHAPTERS.find(c => c.id === id);
  curQ = 0; score = 0; answered = false;
  rX = 0; rY = 5; traces = new Set();
  document.getElementById('win').classList.remove('show');
  buildGrid();
  loadQ();
  show('s-game');
}

function loadQ() {
  answered = false;
  const q = curChap.questions[curQ];
  document.getElementById('g-title').textContent = curChap.name;
  document.getElementById('g-pts').textContent = score + ' pts';
  document.getElementById('g-ctag').textContent = q.c;
  document.getElementById('g-concept').innerHTML = q.code;
  document.getElementById('g-q').textContent = q.q;
  document.getElementById('g-fb').className = 'fb';
  document.getElementById('g-fb').textContent = '';
  document.getElementById('g-next').className = 'btnext';

  // dots
  const dr = document.getElementById('dots-row');
  dr.innerHTML = '';
  curChap.questions.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < curQ ? ' done' : i === curQ ? ' cur' : '');
    dr.appendChild(d);
  });

  // choices
  const cc = document.getElementById('g-choices');
  cc.innerHTML = '';
  q.ch.forEach((t,i) => {
    const b = document.createElement('button');
    b.className = 'choice'; b.textContent = t;
    b.onclick = () => answer(i);
    cc.appendChild(b);
  });
}

function answer(idx) {
  if (answered) return;
  answered = true;
  const q = curChap.questions[curQ];
  const ok = idx === q.ok;
  document.querySelectorAll('.choice').forEach((b,i) => {
    if (i === q.ok) b.classList.add('ok');
    else if (i === idx && !ok) b.classList.add('no');
    else b.classList.add('dim');
    b.onclick = null;
  });
  const fb = document.getElementById('g-fb');
  fb.className = 'fb show ' + (ok ? 'ok' : 'no');
  fb.textContent = ok ? q.fb_ok : q.fb_no;
  if (ok) { score += 10; document.getElementById('g-pts').textContent = score + ' pts'; sparks(); }
  moveRobot(q.mv.dx, q.mv.dy);
  document.getElementById('g-next').className = 'btnext show';
}

function doHint() {
  const fb = document.getElementById('g-fb');
  fb.className = 'fb show hint';
  fb.textContent = '? ' + curChap.questions[curQ].hint;
}

function nextQ() {
  curQ++;
  if (curQ >= curChap.questions.length) { showWin(); return; }
  loadQ();
}

function showWin() {
  document.getElementById('win-title').textContent = `// ${curChap.name} · complété`;
  const ul = document.getElementById('win-list');
  ul.innerHTML = '';
  curChap.takeaway.forEach(t => {
    const li = document.createElement('li'); li.textContent = t;
    ul.appendChild(li);
  });
  document.getElementById('win').classList.add('show');
}

function restartChap() {
  document.getElementById('win').classList.remove('show');
  startChap(curChap.id);
}

// ══════════════════════════════════════════════════════
//  GRILLE
// ══════════════════════════════════════════════════════
function buildGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  for (let y = 0; y < 6; y++) for (let x = 0; x < 6; x++) {
    const d = document.createElement('div');
    d.id = `gc${x}${y}`; d.className = 'gcell';
    if (x === GOAL.x && y === GOAL.y) d.textContent = '🏁';
    g.appendChild(d);
  }
  renderGrid();
}

function renderGrid() {
  for (let y = 0; y < 6; y++) for (let x = 0; x < 6; x++) {
    const d = document.getElementById(`gc${x}${y}`);
    if (!d) continue;
    d.className = 'gcell'; d.textContent = ''; d.innerHTML = '';
    if (x === GOAL.x && y === GOAL.y) { d.classList.add('goal'); d.textContent = '🏁'; continue; }
    if (traces.has(`${x},${y}`)) d.classList.add('trace');
    if (x === rX && y === rY) {
      d.classList.add('robot');
      d.innerHTML = `<svg width="26" height="26" viewBox="0 0 32 32" fill="none">
        <rect x="8" y="12" width="16" height="14" rx="4" fill="#1a1814"/>
        <rect x="11" y="15" width="4" height="4" rx="1.5" fill="#faf8f4"/>
        <rect x="17" y="15" width="4" height="4" rx="1.5" fill="#faf8f4"/>
        <rect x="13" y="21" width="6" height="2" rx="1" fill="#7a9e87"/>
        <rect x="14" y="8" width="4" height="5" rx="2" fill="#1a1814"/>
        <circle cx="16" cy="7" r="2" fill="#e8a598"/>
        <rect x="5" y="16" width="3" height="6" rx="1.5" fill="#1a1814"/>
        <rect x="24" y="16" width="3" height="6" rx="1.5" fill="#1a1814"/>
        <rect x="10" y="26" width="4" height="3" rx="1.5" fill="#1a1814"/>
        <rect x="18" y="26" width="4" height="3" rx="1.5" fill="#1a1814"/>
      </svg>`;
    }
  }
}

function moveRobot(dx, dy) {
  traces.add(`${rX},${rY}`);
  rX = Math.max(0, Math.min(5, rX + dx));
  rY = Math.max(0, Math.min(5, rY + dy));
  renderGrid();
  const dir = dx>0?'droite':dx<0?'gauche':dy<0?'haut':'bas';
  document.getElementById('g-mlog').textContent = `${curQ+1}/${curChap.questions.length} → ${dir}`;
}

function sparks() {
  const cell = document.getElementById(`gc${rX}${rY}`);
  if (!cell) return;
  const r = cell.getBoundingClientRect();
  ['#7a9e87','#e8a598','#8fb4c8','#c8a870'].forEach((c,i) => {
    const p = document.createElement('div'); p.className = 'pt';
    const s = 3 + Math.random() * 5;
    p.style.cssText = `width:${s}px;height:${s}px;background:${c};left:${r.left+r.width/2+(-15+Math.random()*30)}px;top:${r.top+r.height/2}px;animation-delay:${i*0.05}s`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  });
}

buildHome();
</script>
</body>
</html>
