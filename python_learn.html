<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyLearn — Apprendre Python</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f14;
  --surface: #15161d;
  --surface2: #1c1d27;
  --border: #2a2b3a;
  --accent: #7c6af7;
  --accent2: #4fd1a5;
  --accent3: #f7c06a;
  --danger: #f06a6a;
  --text: #e8e9f0;
  --muted: #7c7e96;
  --code-bg: #11121a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.2rem 2rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1.3rem;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: white;
}

.progress-global {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--muted);
}

.progress-bar-wrap {
  width: 180px;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 3px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

/* ── Layout ── */
.app {
  display: grid;
  grid-template-columns: 260px 1fr;
  flex: 1;
  min-height: 0;
}

/* ── Sidebar ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 1.5rem 0;
  overflow-y: auto;
}

.sidebar-section {
  padding: 0 1.2rem;
  margin-bottom: 0.4rem;
}

.sidebar-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-transform: uppercase;
  padding: 0.75rem 0.75rem 0.4rem;
}

.chapter-btn {
  width: 100%;
  text-align: left;
  padding: 0.65rem 0.75rem;
  background: none;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 13.5px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.15s;
  margin-bottom: 2px;
}

.chapter-btn:hover { background: var(--surface2); color: var(--text); }
.chapter-btn.active { background: var(--surface2); color: var(--accent); }
.chapter-btn.done { color: var(--accent2); }
.chapter-btn.locked { opacity: 0.4; cursor: not-allowed; }

.ch-icon {
  width: 24px; height: 24px;
  border-radius: 6px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
}

.chapter-btn.active .ch-icon { background: var(--accent); color: white; }
.chapter-btn.done .ch-icon { background: var(--accent2); color: #0e0f14; }

/* ── Main ── */
.main {
  padding: 2rem;
  overflow-y: auto;
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
}

/* ── Notion header ── */
.notion-header {
  margin-bottom: 2rem;
}

.notion-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent);
  background: rgba(124,106,247,0.12);
  border: 1px solid rgba(124,106,247,0.25);
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 0.75rem;
}

.notion-title {
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 0.75rem;
}

.notion-desc {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.7;
  max-width: 620px;
}

/* ── Concept box ── */
.concept-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 2rem;
}

.concept-box h3 {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--accent3);
  margin-bottom: 0.75rem;
}

.concept-box pre {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13.5px;
  line-height: 1.7;
  background: var(--code-bg);
  border-radius: 8px;
  padding: 1rem 1.25rem;
  overflow-x: auto;
  border: 1px solid var(--border);
}

/* ── Exercice steps ── */
.steps-nav {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 1.75rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px;
}

.step-pill {
  flex: 1;
  padding: 0.55rem 0.5rem;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}

.step-pill:hover { color: var(--text); }
.step-pill.active { background: var(--accent); color: white; }
.step-pill.done { color: var(--accent2); }
.step-pill.locked { opacity: 0.4; cursor: not-allowed; }

.step-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  flex-shrink: 0;
}

.step-pill.active .step-dot { background: rgba(255,255,255,0.25); }
.step-pill.done .step-dot { background: var(--accent2); color: #0e0f14; }

/* ── Exercice card ── */
.ex-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 1.5rem;
}

.ex-header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
}

.ex-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
  margin-bottom: 0.5rem;
}

.badge-easy { background: rgba(79,209,165,0.12); color: var(--accent2); border: 1px solid rgba(79,209,165,0.25); }
.badge-medium { background: rgba(247,192,106,0.12); color: var(--accent3); border: 1px solid rgba(247,192,106,0.25); }
.badge-hard { background: rgba(240,106,106,0.12); color: var(--danger); border: 1px solid rgba(240,106,106,0.25); }

.ex-title {
  font-size: 1.1rem;
  font-weight: 700;
  line-height: 1.3;
}

.ex-desc {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
  margin-top: 0.4rem;
}

/* ── Code editor ── */
.editor-wrap {
  position: relative;
}

.editor-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 1rem;
  background: var(--code-bg);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.editor-dots {
  display: flex; gap: 6px;
}
.editor-dots span {
  width: 10px; height: 10px;
  border-radius: 50%;
}

.code-editor {
  width: 100%;
  background: var(--code-bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  line-height: 1.8;
  padding: 1.25rem 1.5rem;
  border: none;
  outline: none;
  resize: vertical;
  min-height: 160px;
  tab-size: 4;
  display: block;
}

.editor-actions {
  padding: 0.75rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  background: var(--surface2);
  border-top: 1px solid var(--border);
}

.btn-run {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0.55rem 1.2rem;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-run:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-run:active { transform: scale(0.98); }

.btn-hint {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0.55rem 1rem;
  background: none;
  color: var(--accent3);
  border: 1px solid rgba(247,192,106,0.3);
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-hint:hover { background: rgba(247,192,106,0.08); }

.btn-reset {
  margin-left: auto;
  padding: 0.5rem;
  background: none;
  color: var(--muted);
  border: none;
  cursor: pointer;
  font-size: 16px;
  border-radius: 6px;
  transition: color 0.15s;
}

.btn-reset:hover { color: var(--text); }

/* ── Output ── */
.output-box {
  margin: 0 1.5rem 1.25rem;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
  display: none;
}

.output-box.visible { display: block; animation: slideDown 0.2s ease; }

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.output-header {
  padding: 0.5rem 1rem;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
}

.output-header.success { background: rgba(79,209,165,0.1); color: var(--accent2); border-bottom: 1px solid rgba(79,209,165,0.2); }
.output-header.error { background: rgba(240,106,106,0.1); color: var(--danger); border-bottom: 1px solid rgba(240,106,106,0.2); }
.output-header.info { background: rgba(124,106,247,0.1); color: var(--accent); border-bottom: 1px solid rgba(124,106,247,0.2); }

.output-content {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  padding: 0.875rem 1rem;
  background: var(--code-bg);
  white-space: pre-wrap;
  color: var(--text);
}

/* ── Hint ── */
.hint-box {
  margin: 0 1.5rem 1.25rem;
  padding: 0.875rem 1rem;
  background: rgba(247,192,106,0.06);
  border: 1px solid rgba(247,192,106,0.2);
  border-radius: 10px;
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.6;
  display: none;
}

.hint-box.visible { display: block; animation: slideDown 0.2s ease; }
.hint-box strong { color: var(--accent3); }

/* ── Success banner ── */
.success-banner {
  margin: 0 1.5rem 1.25rem;
  padding: 1rem 1.25rem;
  background: rgba(79,209,165,0.08);
  border: 1px solid rgba(79,209,165,0.25);
  border-radius: 12px;
  display: none;
  align-items: center;
  gap: 12px;
}

.success-banner.visible { display: flex; animation: slideDown 0.25s ease; }

.success-icon {
  font-size: 22px;
  flex-shrink: 0;
}

.success-text { font-size: 14px; line-height: 1.5; }
.success-text strong { color: var(--accent2); display: block; font-size: 15px; margin-bottom: 2px; }

.btn-next {
  margin-left: auto;
  padding: 0.55rem 1.1rem;
  background: var(--accent2);
  color: #0e0f14;
  border: none;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}

.btn-next:hover { opacity: 0.85; transform: translateY(-1px); }

/* ── Completion ── */
.completion-card {
  background: var(--surface);
  border: 1px solid rgba(79,209,165,0.3);
  border-radius: 16px;
  padding: 2rem;
  text-align: center;
  display: none;
}

.completion-card.visible { display: block; animation: slideDown 0.3s ease; }
.completion-card .big-icon { font-size: 3rem; margin-bottom: 1rem; }
.completion-card h2 { font-size: 1.5rem; font-weight: 800; color: var(--accent2); margin-bottom: 0.5rem; }
.completion-card p { color: var(--muted); font-size: 15px; margin-bottom: 1.5rem; }

/* Syntax highlight colors */
.kw { color: #b48eff; }
.fn { color: #4fd1a5; }
.str { color: #f7c06a; }
.cm { color: #555870; font-style: italic; }
.num { color: #f06a6a; }

/* Scrollbars */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">py</div>
    PyLearn
  </div>
  <div class="progress-global">
    <span id="progress-label">0 / 0 exercices</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="global-bar" style="width:0%"></div>
    </div>
  </div>
</header>

<div class="app">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main-content"></main>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   CURRICULUM
═══════════════════════════════════════════════════════ */
const curriculum = [
  {
    id: "variables",
    title: "Variables",
    icon: "x",
    tag: "Les bases",
    description: "En Python, une variable est une étiquette collée sur une valeur. Pas besoin de déclarer le type — Python le devine tout seul.",
    concept: `# Créer une variable, c'est simple :
prenom = "Alice"
age = 25
taille = 1.68

# On peut afficher sa valeur :
print(prenom)   # → Alice
print(age)      # → 25`,
    exercises: [
      {
        level: "easy",
        title: "Ta première variable",
        desc: "Crée une variable <code>nom</code> qui contient ton prénom, puis affiche-la avec <code>print()</code>.",
        starter: `nom = `,
        test: (output) => output.trim().length > 0,
        hint: "Assigne une chaîne de caractères entre guillemets : <strong>nom = \"Alice\"</strong>, puis écris <strong>print(nom)</strong>",
        successMsg: "Parfait ! Tu viens de créer ta première variable. Python mémorise la valeur jusqu'à la fin du programme."
      },
      {
        level: "easy",
        title: "Plusieurs variables",
        desc: "Crée trois variables : <code>prenom</code>, <code>age</code> (un nombre entier), et <code>ville</code>. Affiche-les sur trois lignes.",
        starter: `prenom = "Alice"\nage = `,
        test: (output) => output.trim().split("\n").length >= 3,
        hint: "Tu as besoin de trois <strong>print()</strong>. Les entiers s'écrivent sans guillemets : <strong>age = 25</strong>",
        successMsg: "Excellent ! Python distingue automatiquement les chaînes (str), les entiers (int) et les décimaux (float)."
      },
      {
        level: "medium",
        title: "Composition de message",
        desc: "Crée <code>prenom</code> et <code>age</code>, puis affiche une phrase complète avec <code>f\"Bonjour, je m'appelle {prenom} et j'ai {age} ans.\"</code>",
        starter: `prenom = "Alice"\nage = 25\nprint(`,
        test: (output) => output.includes("Bonjour") && output.includes("appelle") && output.includes("ans"),
        hint: "Utilise un <strong>f-string</strong> : <strong>print(f\"Je m'appelle {prenom}\")</strong> — les accolades injectent la variable.",
        successMsg: "Les f-strings sont très utilisés en Python moderne. La notation f\"...{var}...\" s'appelle l'interpolation de chaîne."
      }
    ]
  },
  {
    id: "conditions",
    title: "Conditions",
    icon: "?",
    tag: "Contrôle",
    description: "Avec <code>if</code>, <code>elif</code> et <code>else</code>, ton programme peut prendre des décisions selon les valeurs des variables.",
    concept: `# Structure d'une condition :
age = 20

if age >= 18:
    print("Majeur")
elif age >= 13:
    print("Adolescent")
else:
    print("Enfant")

# Opérateurs : ==  !=  <  >  <=  >=
# Logique    : and  or  not`,
    exercises: [
      {
        level: "easy",
        title: "Pair ou impair ?",
        desc: "La variable <code>n</code> vaut 7. Affiche \"pair\" si <code>n % 2 == 0</code>, sinon affiche \"impair\". Le <code>%</code> donne le reste de la division.",
        starter: `n = 7\nif `,
        test: (output) => output.trim().toLowerCase().includes("impair"),
        hint: "Structure : <strong>if n % 2 == 0:</strong><br>&nbsp;&nbsp;&nbsp;&nbsp;<strong>print(\"pair\")</strong><br><strong>else:</strong><br>&nbsp;&nbsp;&nbsp;&nbsp;<strong>print(\"impair\")</strong>",
        successMsg: "7 % 2 = 1, donc impair. L'opérateur % (modulo) est très pratique pour tester la divisibilité."
      },
      {
        level: "easy",
        title: "Note scolaire",
        desc: "La variable <code>note</code> vaut 14. Affiche \"Excellent\" (≥16), \"Bien\" (≥12), \"Passable\" (≥10) ou \"Insuffisant\" selon la valeur.",
        starter: `note = 14\nif note >= 16:\n    print("Excellent")\n`,
        test: (output) => output.trim().toLowerCase().includes("bien"),
        hint: "Utilise <strong>elif note >= 12:</strong> pour le deuxième cas, etc. Chaque bloc s'exécute si la condition précédente était fausse.",
        successMsg: "Les elif permettent d'enchaîner autant de conditions que nécessaire. Python les évalue dans l'ordre et s'arrête au premier vrai."
      },
      {
        level: "medium",
        title: "Accès VIP",
        desc: "Crée <code>age = 22</code> et <code>vip = True</code>. Affiche \"Entrée gratuite\" si vip ET age >= 18, \"Entrée payante\" si age >= 18 seulement, sinon \"Interdit\".",
        starter: `age = 22\nvip = True\nif `,
        test: (output) => output.trim().toLowerCase().includes("gratuite"),
        hint: "Combine deux conditions : <strong>if vip and age >= 18:</strong> — l'opérateur <strong>and</strong> exige que les deux soient vraies.",
        successMsg: "Les opérateurs logiques and / or / not combinent des conditions booléennes. C'est la base de toute logique de programme."
      }
    ]
  },
  {
    id: "boucles",
    title: "Boucles",
    icon: "↺",
    tag: "Répétition",
    description: "Les boucles permettent de répéter des instructions. <code>for</code> parcourt une séquence, <code>while</code> répète tant qu'une condition est vraie.",
    concept: `# Boucle for — parcours d'une plage :
for i in range(5):       # i = 0,1,2,3,4
    print(i)

# range(début, fin, pas) :
for i in range(1, 10, 2):  # 1,3,5,7,9
    print(i)

# Boucle while :
compteur = 0
while compteur < 3:
    print(compteur)
    compteur += 1`,
    exercises: [
      {
        level: "easy",
        title: "Compter jusqu'à 5",
        desc: "Affiche les nombres de 1 à 5 inclus, un par ligne, avec une boucle <code>for</code> et <code>range()</code>.",
        starter: `for i in range(`,
        test: (output) => {
          const lines = output.trim().split("\n").map(l => l.trim()).filter(l => l);
          return lines.length === 5 && lines[0] === "1" && lines[4] === "5";
        },
        hint: "range(1, 6) génère 1, 2, 3, 4, 5. Le deuxième nombre est <strong>exclu</strong>. Écris ensuite <strong>print(i)</strong> dans le bloc.",
        successMsg: "range(1, 6) → [1, 2, 3, 4, 5]. Retiens : la borne droite est toujours exclue en Python."
      },
      {
        level: "easy",
        title: "Table de multiplication",
        desc: "Affiche la table de multiplication de 3 : \"3 x 1 = 3\", \"3 x 2 = 6\", ..., \"3 x 10 = 30\".",
        starter: `for i in range(1, 11):\n    print(f"3 x {i} = `,
        test: (output) => {
          const lines = output.trim().split("\n").filter(l => l.trim());
          return lines.length === 10 && output.includes("3 x 10 = 30");
        },
        hint: "Dans le print, tu dois calculer le résultat : <strong>f\"3 x {i} = {3 * i}\"</strong>",
        successMsg: "Les f-strings peuvent contenir n'importe quelle expression Python entre accolades, pas seulement des variables !"
      },
      {
        level: "medium",
        title: "Somme des pairs",
        desc: "Calcule la somme de tous les nombres pairs de 2 à 20 (inclus). Affiche le résultat final avec <code>print(\"Somme =\", total)</code>.",
        starter: `total = 0\nfor i in range(`,
        test: (output) => output.includes("110"),
        hint: "Utilise <strong>range(2, 21, 2)</strong> pour sauter de 2 en 2, et accumule : <strong>total += i</strong>",
        successMsg: "2+4+6+...+20 = 110. La variable accumulatrice (total = 0, puis total += i) est un schéma classique en programmation."
      }
    ]
  },
  {

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let state = {
  currentChapter: 0,
  currentStep: 0,
  completed: {},   // {chapterId: {0: true, 1: true, ...}}
  hintShown: {}    // {key: true}
};

// Init completed tracking
curriculum.forEach(ch => { state.completed[ch.id] = {}; });

/* ═══════════════════════════════════════════════════════
   PYTHON INTERPRETER (simple subset)
═══════════════════════════════════════════════════════ */
function runPython(code) {
  let output = "";
  const printFn = (...args) => {
    output += args.map(a => {
      if (Array.isArray(a)) return "[" + a.map(x => typeof x === "string" ? `'${x}'` : String(x)).join(", ") + "]";
      return String(a);
    }).join(" ") + "\n";
  };

  // Transpile Python → JS (simple subset)
  let js = code;

  // Comments
  js = js.replace(/#[^\n]*/g, "");

  // f-strings  f"...{expr}..."
  js = js.replace(/f"((?:[^"\\]|\\.)*)"/g, (_, s) =>
    "`" + s.replace(/\{([^}]+)\}/g, (_, e) => "${" + e + "}") + "`");
  js = js.replace(/f'((?:[^'\\]|\\.)*)'/g, (_, s) =>
    "`" + s.replace(/\{([^}]+)\}/g, (_, e) => "${" + e + "}") + "`");

  // Strings (keep as is)
  js = js.replace(/"""([\s\S]*?)"""/g, (_, s) => "`" + s + "`");

  // print()
  js = js.replace(/\bprint\s*\(/g, "__print__(");

  // True/False/None
  js = js.replace(/\bTrue\b/g, "true").replace(/\bFalse\b/g, "false").replace(/\bNone\b/g, "null");

  // and/or/not
  js = js.replace(/\band\b/g, "&&").replace(/\bor\b/g, "||").replace(/\bnot\b/g, "!");

  // ** power
  js = js.replace(/(\w+)\s*\*\*\s*(\w+)/g, "Math.pow($1,$2)");

  // range(n) → Array.from({length:n},(_, i)=>i)
  // range(a,b) → Array.from({length:b-a},(_, i)=>a+i)
  // range(a,b,s) → manual
  js = js.replace(/range\(([^)]+)\)/g, (_, args) => {
    const parts = args.split(",").map(a => a.trim());
    if (parts.length === 1) return `__range__(0,${parts[0]},1)`;
    if (parts.length === 2) return `__range__(${parts[0]},${parts[1]},1)`;
    return `__range__(${parts[0]},${parts[1]},${parts[2]})`;
  });

  // for x in y: → for (const x of y) {
  // for x, y in y.items(): skip (not supported)
  js = js.replace(/for\s+(\w+)\s+in\s+([^\n:]+):/g, "for (const $1 of $2) {");

  // while cond:
  js = js.replace(/while\s+([^\n:]+):/g, "while ($1) {");

  // if/elif/else
  js = js.replace(/elif\s+([^\n:]+):/g, "} else if ($1) {");
  js = js.replace(/if\s+([^\n:]+):/g, "if ($1) {");
  js = js.replace(/else\s*:/g, "} else {");

  // def fname(params):
  js = js.replace(/def\s+(\w+)\s*\(([^)]*)\)\s*:/g, "function $1($2) {");

  // return
  js = js.replace(/\breturn\b/g, "return");

  // .append(
  js = js.replace(/\.append\(/g, ".push(");
  js = js.replace(/\.remove\(/g, ".__remove__(");

  // len()
  js = js.replace(/\blen\s*\(/g, "__len__(");

  // Convert indentation-based blocks to braces
  // This is the tricky part — use a line-by-line approach
  js = convertIndents(js);

  const rangeHelper = (a, b, s) => {
    const r = [];
    if (s > 0) { for (let i = a; i < b; i += s) r.push(i); }
    else if (s < 0) { for (let i = a; i > b; i += s) r.push(i); }
    return r;
  };

  try {
    const fn = new Function(
      "__print__", "__range__", "__len__",
      js
    );
    fn(
      printFn,
      rangeHelper,
      (x) => Array.isArray(x) ? x.length : String(x).length
    );
  } catch(e) {
    return { ok: false, output: e.message };
  }
  return { ok: true, output };
}

function convertIndents(code) {
  const lines = code.split("\n");
  const result = [];
  const indentStack = [0];

  for (let line of lines) {
    if (!line.trim()) { result.push(""); continue; }
    const indent = line.match(/^(\s*)/)[1].length;
    const content = line.trim();

    // Close blocks for dedents
    while (indentStack.length > 1 && indent < indentStack[indentStack.length - 1]) {
      indentStack.pop();
      result.push("}");
    }

    // If this line opens a block (ends with {) push new indent
    if (content.endsWith("{")) {
      result.push(" ".repeat(indent) + content);
      indentStack.push(indent + 4);
    } else {
      result.push(" ".repeat(indent) + content);
    }
  }

  // Close remaining blocks
  while (indentStack.length > 1) {
    indentStack.pop();
    result.push("}");
  }

  return result.join("\n");
}

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
function totalExercises() {
  return curriculum.reduce((acc, ch) => acc + ch.exercises.length, 0);
}

function completedCount() {
  return Object.values(state.completed).reduce((acc, ch) =>
    acc + Object.values(ch).filter(Boolean).length, 0);
}

function isChapterDone(ch) {
  return ch.exercises.every((_, i) => state.completed[ch.id][i]);
}

function isChapterUnlocked(idx) {
  if (idx === 0) return true;
  return isChapterDone(curriculum[idx - 1]);
}

function renderSidebar() {
  const sb = document.getElementById("sidebar");
  sb.innerHTML = `<div class="sidebar-label">Chapitres</div>`;
  curriculum.forEach((ch, i) => {
    const done = isChapterDone(ch);
    const unlocked = isChapterUnlocked(i);
    const active = i === state.currentChapter;
    let cls = "chapter-btn";
    if (active) cls += " active";
    else if (done) cls += " done";
    else if (!unlocked) cls += " locked";

    const completedInChapter = ch.exercises.filter((_, j) => state.completed[ch.id][j]).length;

    sb.innerHTML += `
      <div class="sidebar-section">
        <button class="${cls}" onclick="goChapter(${i})" ${!unlocked && !active ? "disabled" : ""}>
          <span class="ch-icon">${done ? "✓" : ch.icon}</span>
          <span style="flex:1">${ch.title}</span>
          <span style="font-size:11px;opacity:0.7">${completedInChapter}/${ch.exercises.length}</span>
        </button>
      </div>`;
  });
}

function renderMain() {
  const ch = curriculum[state.currentChapter];
  const step = state.currentStep;
  const ex = ch.exercises[step];
  const chDone = isChapterDone(ch);
  const key = `${ch.id}_${step}`;
  const exDone = state.completed[ch.id][step];

  let html = `
    <div class="notion-header">
      <div class="notion-tag">📚 ${ch.tag}</div>
      <h1 class="notion-title">${ch.title}</h1>
      <p class="notion-desc">${ch.description}</p>
    </div>

    <div class="concept-box">
      <h3>⚡ Exemple de syntaxe</h3>
      <pre>${ch.concept}</pre>
    </div>

    <div class="steps-nav">
      ${ch.exercises.map((e, i) => {
        const done = state.completed[ch.id][i];
        const active = i === step;
        let cls = "step-pill";
        if (active) cls += " active";
        else if (done) cls += " done";
        return `<div class="${cls}" onclick="goStep(${i})">
          <span class="step-dot">${done ? "✓" : i + 1}</span>
          Exercice ${i + 1}
        </div>`;
      }).join("")}
    </div>
  `;

  const levelLabel = { easy: "Débutant", medium: "Intermédiaire", hard: "Avancé" }[ex.level];
  const levelClass = { easy: "badge-easy", medium: "badge-medium", hard: "badge-hard" }[ex.level];

  html += `
    <div class="ex-card" id="ex-card">
      <div class="ex-header">
        <div>
          <div class="ex-badge ${levelClass}">${levelLabel}</div>
          <div class="ex-title">${ex.title}</div>
          <div class="ex-desc">${ex.desc}</div>
        </div>
      </div>

      <div class="editor-wrap">
        <div class="editor-toolbar">
          <div class="editor-dots">
            <span style="background:#f06a6a"></span>
            <span style="background:#f7c06a"></span>
            <span style="background:#4fd1a5"></span>
          </div>
          <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)">main.py</span>
        </div>
        <textarea class="code-editor" id="code-editor" spellcheck="false" autocorrect="off">${ex.starter}</textarea>
        <div class="editor-actions">
          <button class="btn-run" onclick="runCode()">▶ Exécuter</button>
          <button class="btn-hint" onclick="toggleHint('${key}')">💡 Indice</button>
          <button class="btn-reset" title="Réinitialiser" onclick="resetCode()">↺</button>
        </div>
      </div>

      <div class="hint-box ${state.hintShown[key] ? 'visible' : ''}" id="hint-box">
        💡 ${ex.hint}
      </div>

      <div class="output-box" id="output-box">
        <div class="output-header info" id="output-header">▶ Sortie</div>
        <div class="output-content" id="output-content"></div>
      </div>

      <div class="success-banner ${exDone ? 'visible' : ''}" id="success-banner">
        <span class="success-icon">🎉</span>
        <div class="success-text">
          <strong>Exercice réussi !</strong>
          ${ex.successMsg}
        </div>
        ${step < ch.exercises.length - 1
          ? `<button class="btn-next" onclick="goStep(${step + 1})">Suivant →</button>`
          : (state.currentChapter < curriculum.length - 1
            ? `<button class="btn-next" onclick="goChapter(${state.currentChapter + 1})">Prochain chapitre →</button>`
            : `<button class="btn-next" onclick="showCompletion()">Terminer 🏆</button>`
          )
        }
      </div>
    </div>

    <div class="completion-card" id="completion-card">
      <div class="big-icon">🏆</div>
      <h2>Chapitre terminé !</h2>
      <p>Tu maîtrises maintenant les ${ch.title.toLowerCase()} en Python. Continue sur ta lancée !</p>
    </div>
  `;

  if (chDone && step === ch.exercises.length - 1) {
    html += ``;
  }

  document.getElementById("main-content").innerHTML = html;

  // Set cursor at end of editor
  const ed = document.getElementById("code-editor");
  if (ed) {
    ed.addEventListener("keydown", e => {
      if (e.key === "Tab") {
        e.preventDefault();
        const s = ed.selectionStart, end = ed.selectionEnd;
        ed.value = ed.value.substring(0, s) + "    " + ed.value.substring(end);
        ed.selectionStart = ed.selectionEnd = s + 4;
      }
    });
    ed.setSelectionRange(ed.value.length, ed.value.length);
    ed.focus();
  }

  updateProgress();
}

function updateProgress() {
  const total = totalExercises();
  const done = completedCount();
  document.getElementById("progress-label").textContent = `${done} / ${total} exercices`;
  document.getElementById("global-bar").style.width = `${(done / total) * 100}%`;
}

/* ═══════════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════════ */
function goChapter(idx) {
  if (!isChapterUnlocked(idx)) return;
  state.currentChapter = idx;
  state.currentStep = 0;
  renderSidebar();
  renderMain();
  window.scrollTo(0, 0);
}

function goStep(idx) {
  state.currentStep = idx;
  renderMain();
  window.scrollTo(0, 0);
}

function resetCode() {
  const ch = curriculum[state.currentChapter];
  const ex = ch.exercises[state.currentStep];
  document.getElementById("code-editor").value = ex.starter;
}

function toggleHint(key) {
  state.hintShown[key] = !state.hintShown[key];
  const hb = document.getElementById("hint-box");
  hb.classList.toggle("visible", state.hintShown[key]);
}

function runCode() {
  const code = document.getElementById("code-editor").value;
  const ch = curriculum[state.currentChapter];
  const ex = ch.exercises[state.currentStep];

  const result = runPython(code);
  const outBox = document.getElementById("output-box");
  const outHdr = document.getElementById("output-header");
  const outContent = document.getElementById("output-content");

  outBox.classList.add("visible");
  outContent.textContent = result.output || "(aucune sortie)";

  if (!result.ok) {
    outHdr.className = "output-header error";
    outHdr.textContent = "✗ Erreur";
    return;
  }

  const passed = ex.test(result.output);

  if (passed) {
    outHdr.className = "output-header success";
    outHdr.textContent = "✓ Sortie";
    state.completed[ch.id][state.currentStep] = true;
    document.getElementById("success-banner").classList.add("visible");
    renderSidebar();
    updateProgress();
  } else {
    outHdr.className = "output-header info";
    outHdr.textContent = "▶ Sortie";
  }
}

function showCompletion() {
  const card = document.getElementById("completion-card");
  if (card) card.classList.add("visible");
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
renderSidebar();
renderMain();
</script>
</body>
</html>
